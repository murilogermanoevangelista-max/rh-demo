let feriasFiltro='todos',feriasBusca='',feriasObraFiltro='';

async function renderFerias(){
  await loadFerias();
  const hoje=new Date();hoje.setHours(0,0,0,0);

  // Aplicar filtro de obra (global ou local do módulo)
  const obraFiltroAtivo=feriasObraFiltro||'';
  const feriasBase=obraFiltroAtivo
    ?feriasData.filter(f=>f.funcionario?.obra?.codigo===obraFiltroAtivo)
    :feriasData;

  // Agrupar por matrícula, ordenar por periodo_aquisitivo_inicio asc
  const byMat={};
  feriasBase.forEach(f=>{
    const mat=f.matricula||'?';
    if(!byMat[mat])byMat[mat]=[];
    byMat[mat].push(f);
  });
  Object.values(byMat).forEach(arr=>arr.sort((a,b)=>{
    const da=parseDate(a.periodo_aquisitivo_inicio)||new Date(0);
    const db=parseDate(b.periodo_aquisitivo_inicio)||new Date(0);
    return da-db;
  }));

  const totalFuncs=Object.keys(byMat).length;
  const totalPeriodos=feriasBase.length;

  // Stats
  let progCount=0,naoProgCount=0;
  let per1Vencidas=0,per1Vencendo60=0;
  let per2Vencidas=0,per2Vencendo60=0;
  let alertaVencidas=0,alertaVencendo30=0;

  Object.values(byMat).forEach(arr=>{
    if(arr.some(f=>f.programado))progCount++;
    if(arr.some(f=>!f.programado))naoProgCount++;
    const p1=arr[0],p2=arr[1];
    // 1º período — alerta pelo Limite Máx. Legal
    if(p1&&!p1.programado){
      const limMax=parseDate(p1.dt_limite_maxima);
      if(limMax){const d=Math.floor((limMax-hoje)/86400000);
        if(d<0){per1Vencidas++;alertaVencidas++;}
        else if(d<=60){per1Vencendo60++;alertaVencendo30++;}
      }
    }
    // 2º período — alerta pelo Limite Máx. Legal
    if(p2&&!p2.programado){
      const limMax=parseDate(p2.dt_limite_maxima);
      if(limMax){const d=Math.floor((limMax-hoje)/86400000);
        if(d<0){per2Vencidas++;alertaVencidas++;}
        else if(d<=60){per2Vencendo60++;alertaVencendo30++;}
      }
    }
  });

  // Status por funcionário para ordenação/filtro
  // Status sempre pelo período mais antigo não programado (1º vence antes → gera multa)
  function getPeriodoUrgente(arr){
    // Retorna o período pendente (não gozado) mais antigo
    return arr.find(p=>ePendente(p))||null;
  }
  function getStatus(arr){
    const p=getPeriodoUrgente(arr);if(!p)return'ok';
    const limMax=parseDate(p.dt_limite_maxima);
    if(limMax&&limMax<hoje)return'vencida';
    if(limMax){const d=Math.floor((limMax-hoje)/86400000);if(d>=0&&d<=60)return'vencendo';}
    return'ok';
  }

  // Filtros
  let listaFuncs=Object.values(byMat);
  if(feriasBusca)listaFuncs=listaFuncs.filter(arr=>{
    const f=arr[0];
    return(f.funcionario?.nome_completo||'').toLowerCase().includes(feriasBusca.toLowerCase())||(f.matricula||'').includes(feriasBusca);
  });
  if(feriasFiltro==='programado')listaFuncs=listaFuncs.filter(arr=>arr.some(f=>f.programado));
  if(feriasFiltro==='naoprog')listaFuncs=listaFuncs.filter(arr=>arr.some(p=>ePendente(p)));
  if(feriasFiltro==='vencidas')listaFuncs=listaFuncs.filter(arr=>{const p=getPeriodoUrgente(arr);if(!p)return false;const l=parseDate(p.dt_limite_maxima);return l&&l<hoje;});
  if(feriasFiltro==='vencendo60')listaFuncs=listaFuncs.filter(arr=>{const p=getPeriodoUrgente(arr);if(!p)return false;const l=parseDate(p.dt_limite_maxima);if(!l)return false;const d=Math.floor((l-hoje)/86400000);return d>=0&&d<=60;});
  if(feriasFiltro==='per1vencida')listaFuncs=listaFuncs.filter(arr=>{const p=arr[0];if(!p||p.programado)return false;const l=parseDate(p.dt_limite_maxima);return l&&l<hoje;});
  if(feriasFiltro==='per1vencendo')listaFuncs=listaFuncs.filter(arr=>{const p=arr[0];if(!p||p.programado)return false;const l=parseDate(p.dt_limite_maxima);if(!l)return false;const d=Math.floor((l-hoje)/86400000);return d>=0&&d<=60;});
  if(feriasFiltro==='per2vencida')listaFuncs=listaFuncs.filter(arr=>{const p=arr[1];if(!p||p.programado)return false;const l=parseDate(p.dt_limite_maxima);return l&&l<hoje;});
  if(feriasFiltro==='per2vencendo')listaFuncs=listaFuncs.filter(arr=>{const p=arr[1];if(!p||p.programado)return false;const l=parseDate(p.dt_limite_maxima);if(!l)return false;const d=Math.floor((l-hoje)/86400000);return d>=0&&d<=60;});

  // Ordenar por urgência real:
  // Critério: periodo_aquisitivo_fim do período mais urgente (não programado)
  // Quem vence primeiro aparece no topo
  function getDataUrgente(arr){
    const pendentes=arr.filter(p=>ePendente(p));
    if(pendentes.length===0) return parseDate(arr[arr.length-1]?.periodo_aquisitivo_fim)||new Date(9999,0);
    const datas=pendentes.map(p=>parseDate(p.dt_limite_maxima)||new Date(9999,0));
    return datas.reduce((min,d)=>d<min?d:min, new Date(9999,0));
  }
  // Período "pendente" = não gozado ainda
  // programado mas data_inicio no futuro = agendado mas não saiu = AINDA pendente
  function ePendente(p){
    if(!p.programado) return true;
    const ini=parseDate(p.data_inicio_programada);
    return !ini || ini > hoje; // se início futuro, ainda não gozou
  }
  function getUrgenciaNivel(arr){
    // 0=limMax vencido (férias não gozadas — multa legal)
    // 1=prazo p/ programar vencido
    // 2=vencendo <=60d no limMax
    // 3=vencendo <=90d no limMax
    // 4=em curso agora ou gozado
    const pendentes=arr.filter(p=>ePendente(p));
    if(pendentes.length===0) return 4;
    let melhorNivel=4, melhorData=new Date(9999,0);
    pendentes.forEach(p=>{
      const limMax=parseDate(p.dt_limite_maxima);
      if(!limMax) return;
      const diasLim=Math.floor((limMax-hoje)/86400000);
      const fimPer=parseDate(p.periodo_aquisitivo_fim);
      const progAte=fimPer?new Date(fimPer.getTime()-60*86400000):null;
      const diasProg=progAte?Math.floor((progAte-hoje)/86400000):null;
      let nivel=4;
      if(diasLim<0) nivel=0;
      else if(diasProg!==null&&diasProg<0) nivel=1;
      else if(diasLim<=60) nivel=2;
      else if(diasLim<=90) nivel=3;
      if(nivel<melhorNivel||(nivel===melhorNivel&&limMax<melhorData)){
        melhorNivel=nivel; melhorData=limMax;
      }
    });
    return melhorNivel;
  }
  listaFuncs.sort((a,b)=>{
    const na=getUrgenciaNivel(a), nb=getUrgenciaNivel(b);
    if(na!==nb) return na-nb;       // nível de urgência primeiro
    return getDataUrgente(a)-getDataUrgente(b); // data mais próxima primeiro
  });

  // Alertas — clicáveis para filtrar a tabela
  const alertas=[];
  if(alertaVencidas>0)alertas.push(`<div onclick="feriasFiltro='vencidas';renderFerias()" style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--radius);margin-bottom:6px;background:var(--danger-light);border:1px solid #FCA5A5;color:#991B1B;cursor:pointer"><i class="ti ti-alert-triangle" style="font-size:18px;flex-shrink:0"></i><strong>${alertaVencidas} funcionário(s) com férias vencidas — risco legal</strong><i class="ti ti-chevron-right" style="margin-left:auto;opacity:.5"></i></div>`);
  if(alertaVencendo30>0)alertas.push(`<div onclick="feriasFiltro='vencendo60';renderFerias()" style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--radius);margin-bottom:6px;background:var(--warning-light);border:1px solid #FCD34D;color:#92400E;cursor:pointer"><i class="ti ti-clock" style="font-size:18px;flex-shrink:0"></i><strong>${alertaVencendo30} vencendo em 60 dias — programar urgente</strong><i class="ti ti-chevron-right" style="margin-left:auto;opacity:.5"></i></div>`);

  // Obras
  const obrasUnicas=[...new Set(feriasData.map(f=>f.funcionario?.obra?.codigo).filter(Boolean))];
  const obraFilterOpts=obrasUnicas.map(c=>`<option value="${c}" ${feriasObraFiltro===c?'selected':''}>${c}</option>`).join('');

  // Helper: bloco de período
  function blocoPeríodo(f, isSegundo, per2Ref){
    if(!f) return '<td style="text-align:center;color:var(--text-muted);font-size:12px;padding:8px 12px">—</td>';
    const limMax  = parseDate(f.dt_limite_maxima);
    const fimPer  = parseDate(f.periodo_aquisitivo_fim);
    const perAqui = formatDate(f.periodo_aquisitivo_inicio) + ' → ' + formatDate(f.periodo_aquisitivo_fim);
    const dias    = f.dias_direito || 30;

    // Datas de controle
    const progAte   = fimPer ? new Date(fimPer.getTime() - 60*86400000) : null;
    const iniAlerta = fimPer ? new Date(fimPer.getTime() - 90*86400000) : null;
    const diasProg  = progAte  ? Math.floor((progAte  - hoje)/86400000) : null;
    const diasFim   = fimPer   ? Math.floor((fimPer   - hoje)/86400000) : null;
    const naZona    = iniAlerta ? (hoje >= iniAlerta) : false;

    var cor, bg, border, icon, corpo;

    if (f.programado) {
      cor='var(--success)'; bg='var(--success-light)'; border='none'; icon='✓ ';
      corpo = '<span style="font-size:11px;font-weight:600;color:var(--success)">Programado · ' + dias + 'd</span>';

    } else if (isSegundo) {
      // ── 2º PERÍODO ──
      // Data principal = periodo_aquisitivo_fim (23/09/2026) — vencimento real das férias
      // NÃO usar dt_limite_maxima como data principal
      var feriasVenc = diasFim  !== null && diasFim  < 0;
      var prazoVenc  = !feriasVenc && diasProg !== null && diasProg < 0;
      var vermelho   = !feriasVenc && !prazoVenc && diasProg !== null && diasProg <= 60;
      var amarelo    = !feriasVenc && !prazoVenc && !vermelho && naZona;

      if (feriasVenc) {
        cor='var(--danger)'; bg='var(--danger-light)'; border='1px solid #FCA5A5'; icon='⚠️ ';
        corpo = '<span style="font-size:11px;font-weight:700;color:var(--danger)">Férias vencidas — risco legal</span>';
      } else if (prazoVenc) {
        cor='var(--danger)'; bg='var(--danger-light)'; border='1px solid #FCA5A5'; icon='🔴 ';
        corpo = '<span style="font-size:11px;font-weight:700;color:var(--danger)">' + diasFim + 'd para vencer</span>'
              + '<br><span style="font-size:10px;color:var(--danger)">Programar até: <strong>' + formatDate(progAte) + '</strong> (prazo vencido)</span>';
      } else if (vermelho) {
        cor='var(--danger)'; bg='var(--danger-light)'; border='1px solid #FCA5A5'; icon='🔴 ';
        corpo = '<span style="font-size:11px;font-weight:700;color:var(--danger)">' + diasProg + 'd para o prazo</span>'
              + '<br><span style="font-size:10px;color:var(--danger)">Programar até: <strong>' + formatDate(progAte) + '</strong></span>';
      } else if (amarelo) {
        cor='#b45309'; bg='var(--warning-light)'; border='1px solid #FCD34D'; icon='🟡 ';
        corpo = '<span style="font-size:11px;font-weight:700;color:#b45309">' + diasProg + 'd para o prazo</span>'
              + '<br><span style="font-size:10px;color:#b45309">Programar até: <strong>' + formatDate(progAte) + '</strong></span>';
      } else {
        cor='var(--text)'; bg='transparent'; border='none'; icon='';
        // Contador = dias até o vencimento das férias (fimPer)
        corpo = '<span style="font-size:11px;font-weight:600;color:var(--text)">' + (diasFim !== null ? diasFim + 'd para vencer' : '—') + '</span>'
              + (progAte ? '<br><span style="font-size:10px;color:var(--text-muted)">Programar até: ' + formatDate(progAte) + '</span>' : '');
      }

      // Para o 2º período: mostrar fimPer (vencimento real) como data principal, não limMax
      return '<td style="padding:8px 12px">'
        + '<div style="font-size:10px;color:var(--text-muted);margin-bottom:4px;white-space:nowrap">' + perAqui + '</div>'
        + '<div style="background:' + bg + ';border:' + border + ';border-radius:6px;padding:6px 10px;display:inline-block;min-width:140px">'
          + '<div style="font-size:13px;font-weight:700;color:' + cor + '">' + icon + (formatDate(fimPer)||'—') + '</div>'
          + (corpo ? '<div style="margin-top:4px;line-height:1.5">' + corpo + '</div>' : '')
        + '</div>'
      + '</td>';

    } else {
      // ── 1º PERÍODO ──
      var jaVenc  = limMax && limMax < hoje;
      var temProx = !!per2Ref;

      // Usar fimPer para saber se o período aquisitivo já passou
      var perAqVenc = fimPer && fimPer < hoje;

      if (!temProx && jaVenc) {
        // Único período e limite máx já venceu — risco legal
        cor='var(--danger)'; bg='var(--danger-light)'; border='1px solid #FCA5A5'; icon='⚠️ ';
        corpo = '<span style="font-size:11px;font-weight:700;color:var(--danger)">1º Período Vencido</span>'
              + '<br><span style="font-size:10px;color:var(--danger)">Férias não gozadas — ação necessária</span>';
      } else if (temProx && perAqVenc) {
        // Período aquisitivo já passou mas há 2º — discreto
        cor='var(--text-muted)'; bg='transparent'; border='none'; icon='';
        corpo = '<span style="font-size:11px;color:var(--text-muted)">1º Período Vencido</span>';
      } else if (temProx) {
        // Período aquisitivo ainda vigente com 2º — discreto
        cor='var(--text-muted)'; bg='transparent'; border='none'; icon='';
        corpo = '<span style="font-size:11px;color:var(--text-muted)">1º Período em curso</span>';
      } else {
        // Único período, ainda vigente — mostrar data e contador normal
        var dM = limMax ? Math.floor((limMax-hoje)/86400000) : null;
        var warnMax = dM!==null && dM<=60;
        cor = warnMax?'var(--warning)':'var(--text)';
        bg = warnMax?'var(--warning-light)':'transparent';
        border = warnMax?'1px solid #FCD34D':'none';
        icon = warnMax?'⏰ ':'';
        corpo = dM!==null ? '<span style="font-size:11px;font-weight:600;color:'+cor+'">' + dM + 'd restantes · ' + dias + 'd</span>' : '';
      }
    }

    // Retorno padrão para 1º período
    // Se há 2º período ou é só status (em curso/vencido), não mostrar data
    var mostrarData = !temProx && !jaVenc;
    return '<td style="padding:8px 12px">'
      + '<div style="font-size:10px;color:var(--text-muted);margin-bottom:4px;white-space:nowrap">' + perAqui + '</div>'
      + '<div style="background:' + bg + ';border:' + border + ';border-radius:6px;padding:6px 10px;display:inline-block;min-width:140px">'
        + (mostrarData ? '<div style="font-size:13px;font-weight:700;color:' + cor + '">' + icon + (formatDate(limMax)||'—') + '</div>' : '')
        + (corpo ? '<div style="margin-top:4px;line-height:1.5">' + corpo + '</div>' : '')
      + '</div>'
    + '</td>';
  }

  // Projetar 2º período no padrão TOTVS quando não existe na planilha
  function projetarPer2(per1){
    const fimPer1=parseDate(per1.periodo_aquisitivo_fim);
    if(!fimPer1)return null;
    const inicioPer2=new Date(fimPer1);inicioPer2.setDate(inicioPer2.getDate()+1);
    const fimPer2=new Date(inicioPer2);fimPer2.setFullYear(fimPer2.getFullYear()+1);fimPer2.setDate(fimPer2.getDate()-1);
    // Limite Máx. Legal do 2º = mesmo do 1º projetado +1 ano
    const limMaxPer1=parseDate(per1.dt_limite_maxima);
    const limMaxPer2=limMaxPer1?new Date(limMaxPer1.getFullYear()+1,limMaxPer1.getMonth(),limMaxPer1.getDate()):null;
    return{
      _projetado:true,
      matricula:per1.matricula,
      funcionario:per1.funcionario,
      programado:false,
      dias_direito:per1.dias_direito||30,
      periodo_aquisitivo_inicio:toISO(inicioPer2),
      periodo_aquisitivo_fim:toISO(fimPer2),
      dt_limite_maxima:toISO(limMaxPer2),
      dt_limite_ideal:null,
    };
  }

  // Tabela
  const rows=listaFuncs.map(arr=>{
    const f0=arr[0];
    const nomeFunc=f0.funcionario?.nome_completo||f0.matricula||'—';
    const obraFunc=f0.funcionario?.obra?.codigo
      ?`${f0.funcionario.obra.codigo} — ${f0.funcionario.obra.nome||''}`
      :f0.funcionario?.obra?.nome||'—';
    const per1=arr[0]||null;
    const per2=arr[1]||( per1?projetarPer2(per1):null );
    const st=getStatus(arr);
    const rowStyle=st==='vencida'?'border-left:4px solid var(--danger)':st==='vencendo'?'border-left:4px solid var(--warning)':'';
    const pendente=arr.find(f=>!f.programado);
    const programados=arr.filter(f=>f.programado);
    const btnProg=`<div style="display:flex;flex-direction:column;gap:4px;align-items:flex-start">
      ${programados.map(f=>`
        <div style="display:flex;align-items:center;gap:4px">
          <button class="prog-btn programada" style="font-size:11px;padding:3px 8px" onclick="openModalProgramarFerias('${f.id}')"><i class="ti ti-edit" style="font-size:11px"></i> Alterar</button>
          <button class="prog-btn" style="background:#FEE2E2;color:#991B1B;border-color:#FCA5A5;font-size:11px;padding:3px 8px" onclick="cancelarProgFerias('${f.id}')"><i class="ti ti-x" style="font-size:11px"></i> Cancelar</button>
        </div>`).join('')}
      ${pendente?`<button class="prog-btn" style="font-size:11px;padding:3px 8px" onclick="openModalProgramarFerias('${pendente.id}')">📅 Programar${arr.length>1?' Per.'+(arr.indexOf(pendente)+1):''}</button>`:''}
    </div>`;
    const progResume=programados.map(f=>
      `<div style="font-size:11px;color:var(--success)">✓ ${f.dias_programados||'?'}d: ${formatDate(f.data_inicio_programada)} → ${formatDate(f.data_fim_programada)}</div>`
    ).join('')||'<span style="color:var(--text-muted);font-size:12px">—</span>';

    return`<tr style="${rowStyle}">
      <td><div class="name-cell">
        <div class="avatar">${initials(nomeFunc)}</div>
        <div>
          <div style="font-weight:500">${nomeFunc}</div>
          <div style="font-size:11px;color:var(--text-muted)">${f0.matricula||'—'}</div>
          ${f0.funcionario?.funcao?.nome?`<div style="font-size:11px;color:var(--primary-dark);font-weight:500;margin-top:1px">${f0.funcionario.funcao.nome}</div>`:''}
          ${f0.funcionario?.data_admissao?`<div style="font-size:10px;color:var(--text-muted);margin-top:1px">Admissão: ${formatDate(f0.funcionario.data_admissao)}</div>`:''}
        </div>
      </div></td>
      <td style="font-size:12px;white-space:nowrap">${obraFunc}</td>
      ${blocoPeríodo(per1,false,per2)}
      ${blocoPeríodo(per2,true,null)}
      <td>${progResume}</td>
      <td>${btnProg}</td>
    </tr>`;
  }).join('')||`<tr><td colspan="8"><div class="empty-state"><i class="ti ti-palm-tree"></i><div>Nenhum registro encontrado</div><div style="font-size:12px;margin-top:8px">Importe a planilha do DP para começar</div></div></td></tr>`;

  document.getElementById('main-content').innerHTML=`
    <div class="page-header">
      <div><div class="page-title">Controle de Férias</div><div class="page-subtitle">${totalFuncs} funcionários · ${totalPeriodos} períodos</div></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm" onclick="exportFeriasExcel()"><i class="ti ti-file-type-xls"></i> Excel</button>
        <button class="btn btn-sm btn-success" onclick="exportFeriasPDF()"><i class="ti ti-file-type-pdf"></i> PDF</button>
        <button class="btn btn-primary" onclick="openImportFerias()"><i class="ti ti-upload"></i> Importar planilha DP</button>
      </div>
    </div>
    ${alertas.length?`<div style="margin-bottom:16px">${alertas.join('')}</div>`:''}

    <!-- Cards linha 1: geral -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px">
      <div class="ferias-card ${feriasFiltro==='todos'?'active':''}" onclick="feriasFiltro='todos';renderFerias()">
        <div class="ferias-card-value" style="color:var(--text)">${totalFuncs}</div>
        <div class="ferias-card-label">Funcionários</div>
      </div>
      <div class="ferias-card green ${feriasFiltro==='programado'?'active':''}" onclick="feriasFiltro='programado';renderFerias()">
        <div class="ferias-card-value">${progCount}</div>
        <div class="ferias-card-label">Programadas</div>
      </div>
      <div class="ferias-card blue ${feriasFiltro==='naoprog'?'active':''}" onclick="feriasFiltro='naoprog';renderFerias()">
        <div class="ferias-card-value">${naoProgCount}</div>
        <div class="ferias-card-label">Não Progr.</div>
      </div>
    </div>

    <!-- Cards linha 2: por período -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
      <div style="background:var(--surface);border:2px solid #BFDBFE;border-radius:var(--radius-lg);padding:14px">
        <div style="font-size:11px;font-weight:700;color:#1E40AF;margin-bottom:10px;letter-spacing:.5px">
          📅 1º PERÍODO AQUISITIVO
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div style="background:var(--danger-light);border-radius:var(--radius);padding:10px;text-align:center;cursor:pointer;border:2px solid ${feriasFiltro==='per1vencida'?'var(--danger)':'transparent'}" onclick="feriasFiltro='per1vencida';renderFerias()">
            <div style="font-size:26px;font-weight:700;color:var(--danger)">${per1Vencidas}</div>
            <div style="font-size:10px;color:var(--danger);font-weight:600;text-transform:uppercase">Vencidas</div>
          </div>
          <div style="background:var(--warning-light);border-radius:var(--radius);padding:10px;text-align:center;cursor:pointer;border:2px solid ${feriasFiltro==='per1vencendo'?'var(--warning)':'transparent'}" onclick="feriasFiltro='per1vencendo';renderFerias()">
            <div style="font-size:26px;font-weight:700;color:var(--warning)">${per1Vencendo60}</div>
            <div style="font-size:10px;color:var(--warning);font-weight:600;text-transform:uppercase">Vencendo 60d</div>
          </div>
        </div>
      </div>
      <div style="background:var(--surface);border:2px solid #FED7AA;border-radius:var(--radius-lg);padding:14px">
        <div style="font-size:11px;font-weight:700;color:#C2410C;margin-bottom:10px;letter-spacing:.5px">
          📅 2º PERÍODO AQUISITIVO
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div style="background:var(--danger-light);border-radius:var(--radius);padding:10px;text-align:center;cursor:pointer;border:2px solid ${feriasFiltro==='per2vencida'?'var(--danger)':'transparent'}" onclick="feriasFiltro='per2vencida';renderFerias()">
            <div style="font-size:26px;font-weight:700;color:var(--danger)">${per2Vencidas}</div>
            <div style="font-size:10px;color:var(--danger);font-weight:600;text-transform:uppercase">Vencidas</div>
          </div>
          <div style="background:var(--warning-light);border-radius:var(--radius);padding:10px;text-align:center;cursor:pointer;border:2px solid ${feriasFiltro==='per2vencendo'?'var(--warning)':'transparent'}" onclick="feriasFiltro='per2vencendo';renderFerias()">
            <div style="font-size:26px;font-weight:700;color:var(--warning)">${per2Vencendo60}</div>
            <div style="font-size:10px;color:var(--warning);font-weight:600;text-transform:uppercase">Vencendo 60d</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Filtros -->
    <div class="filters">
      <div class="search-box"><i class="ti ti-search"></i><input placeholder="Buscar por nome ou matrícula..." value="${feriasBusca}" oninput="feriasBusca=this.value;renderFerias()"></div>
      <select class="filter-select" onchange="feriasObraFiltro=this.value;renderFerias()">
        <option value="">Todas as obras</option>${obraFilterOpts}
      </select>
      <button class="btn btn-sm" onclick="feriasFiltro='todos';feriasBusca='';feriasObraFiltro='';renderFerias()"><i class="ti ti-x"></i> Limpar</button>
    </div>

    <!-- Tabela -->
    <div class="table-container" style="overflow-x:auto"><table>
      <thead>
        <tr>
          <th rowspan="2" style="min-width:180px">Funcionário</th>
          <th rowspan="2">Obra / C. Custo</th>
          <th style="text-align:center;background:#EFF6FF;color:#1E40AF;border-bottom:2px solid #BFDBFE;padding:8px;font-size:10px;font-weight:700;letter-spacing:.5px">
            1º PERÍODO — LIMITE MÁX. LEGAL
          </th>
          <th style="text-align:center;background:#FFF7ED;color:#C2410C;border-bottom:2px solid #FED7AA;padding:8px;font-size:10px;font-weight:700;letter-spacing:.5px">
            2º PERÍODO — LIMITE MÁX. LEGAL
          </th>
          <th rowspan="2">Programação</th>
          <th rowspan="2"></th>
        </tr>
        <tr>
          <th style="background:#EFF6FF;color:#1E40AF;font-size:10px;font-weight:600;padding:5px 12px">⚠️ Alerta 60 dias antes do vencimento</th>
          <th style="background:#FFF7ED;color:#C2410C;font-size:10px;font-weight:600;padding:5px 12px">⚠️ Alerta 60 dias antes do vencimento</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table></div>
  `;
}


// Modal programar férias
function openModalProgramarFerias(id){
  const f=feriasData.find(x=>x.id===id);if(!f)return;
  const nomeFunc=f.funcionario?.nome_completo||f.matricula||'—';
  document.body.insertAdjacentHTML('beforeend',`
    <div class="modal-overlay" id="modal-prog-ferias" onclick="if(event.target===this)closeModal('modal-prog-ferias')">
      <div class="modal" style="max-width:480px">
        <div class="modal-header">
          <span class="modal-title">${f.programado?"✏️ Alterar Férias":"📅 Programar Férias"}</span>
          <button class="btn btn-sm" onclick="closeModal('modal-prog-ferias')"><i class="ti ti-x"></i></button>
        </div>
        <div class="modal-body">
          <div style="background:var(--bg);border-radius:var(--radius);padding:12px;margin-bottom:16px">
            <div style="font-weight:600">${nomeFunc}</div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:4px">
              Matrícula: ${f.matricula||'—'} · Período: ${formatDate(f.periodo_aquisitivo_inicio)} → ${formatDate(f.periodo_aquisitivo_fim)}
            </div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:2px">
              Limite ideal: <strong>${formatDate(f.dt_limite_ideal)}</strong> · Limite máximo: <strong>${formatDate(f.dt_limite_maxima)}</strong>
            </div>
            <div style="font-size:12px;margin-top:4px">Direito: <strong>${f.dias_direito||30} dias</strong></div>
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label>Dias de férias *</label>
              <select id="prog-dias">
                <option value="30" ${f.dias_programados==30?'selected':''}>30 dias</option>
                <option value="20" ${f.dias_programados==20?'selected':''}>20 dias</option>
                <option value="15" ${f.dias_programados==15?'selected':''}>15 dias</option>
                <option value="10" ${f.dias_programados==10?'selected':''}>10 dias</option>
              </select>
            </div>
            <div class="form-group"><!-- spacer --></div>
            <div class="form-group">
              <label>Data início *</label>
              <input type="date" id="prog-inicio" value="${f.data_inicio_programada||''}">
            </div>
            <div class="form-group">
              <label>Data fim *</label>
              <input type="date" id="prog-fim" value="${f.data_fim_programada||''}">
            </div>
          </div>
          <div style="margin-top:12px;padding:10px;background:var(--info-light);border-radius:var(--radius);font-size:12px;color:var(--info)">
            <i class="ti ti-info-circle"></i> A programação é salva no sistema e não altera os dados importados do DP.
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn" onclick="closeModal('modal-prog-ferias')">Cancelar</button>
          ${f.programado?`<button class="btn btn-danger" onclick="desproramarFerias('${id}')"><i class="ti ti-x"></i> Desmarcar</button>`:''}
          <button class="btn btn-primary" onclick="salvarProgFerias('${id}')"><i class="ti ti-check"></i> ${f.programado?"Salvar alteração":"Salvar programação"}</button>
        </div>
      </div>
    </div>`);
}

async function salvarProgFerias(id){
  const dias=parseInt(document.getElementById('prog-dias').value);
  const inicio=document.getElementById('prog-inicio').value;
  const fim=document.getElementById('prog-fim').value;

function processImportFile(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      // cellDates:true para que XLSX já converta serial → Date
      const wb=XLSX.read(e.target.result,{type:'array',cellDates:true,dateNF:'yyyy-mm-dd'});
      // Sheet: "1-Cabeçalho de Férias" ou primeira
      const sheetName=wb.SheetNames.find(n=>n.toLowerCase().includes('cabe'))||wb.SheetNames[0];
      const ws=wb.Sheets[sheetName];
      const data=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:'',dateNF:'yyyy-mm-dd'});

      // Estrutura conhecida da planilha GTEL:
      // Row 0: "Cabeçalho de Férias" (título)
      // Row 1: Filial | Centro Custo | Matricula | Nome | Data Admis. | Data Base Ferias |
      //         Periodo Aquisitivo | Dt.Limite Ideal | Dt.Limite Maxima | Ferias Vencidas |
      //         D.Abat.Faltas | Ferias Proporc. | Faltas Proporc. | TOTAL Ferias | PROGFER | DIASFER ...
      // Row 2+: dados

      // Encontrar linha de cabeçalho buscando "Matricula" ou "Filial"
      let headerRow=-1;
      for(let i=0;i<Math.min(data.length,5);i++){
        const rowStr=data[i].map(c=>String(c||'').toLowerCase()).join('|');
        if(rowStr.includes('matricula')||rowStr.includes('matrícula')||rowStr.includes('filial')){
          headerRow=i;break;
        }
      }
      if(headerRow===-1){showToast('Formato de planilha não reconhecido — linha de cabeçalho não encontrada','error');return;}

      const headers=data[headerRow].map(h=>String(h||'').toLowerCase().replace(/\s+/g,' ').trim());

      // Mapeamento por posição — busca flexível nos cabeçalhos
      function findCol(...terms){
        return headers.findIndex(h=>terms.some(t=>h.includes(t)));
      }
      const COL={
        centroCusto: findCol('centro','custo'),         // col 1
        matricula:   findCol('matricula','matrícula'),   // col 2
        nome:        findCol('nome'),                    // col 3
        dataAdmis:   findCol('admis','admissão','admissao'), // col 4 — Data Admis.
        periodoAqui: findCol('aquisitivo','periodo a'),  // col 6 — string "DD/MM/YYYY  DD/MM/YYYY"
        dtIdeal:     findCol('ideal'),                   // col 7 se existir — Date (opcional)
        dtMaxima:    findCol('maxima','máxima','limite max','dt.limite'),// col 7 — Date
        feriasVenc:  findCol('vencidas'),                // col 8
        totalFerias: findCol('total'),                   // col 12
      };

      // Fallback: se busca por texto falhou use posições fixas do layout TOTVS/GTEL
      // Layout real: col6=PeriodoAqui | col7=Dt.Limite Maxima | col8=FeriasVencidas | col12=TotalFerias
      // Nota: este layout NÃO tem coluna "Ideal" separada
      if(COL.matricula===-1) COL.matricula=2;
      if(COL.nome===-1)      COL.nome=3;
      if(COL.centroCusto===-1) COL.centroCusto=1;
      if(COL.dataAdmis===-1) COL.dataAdmis=4;
      if(COL.periodoAqui===-1) COL.periodoAqui=6;
      if(COL.dtMaxima===-1)  COL.dtMaxima=7;
      if(COL.feriasVenc===-1) COL.feriasVenc=8;
      if(COL.totalFerias===-1) COL.totalFerias=12;
      // dtIdeal não existe neste layout — deixar -1 para gravar null
      // (se existir em outro layout, será encontrado pelo findCol acima)

      // Helper: converte qualquer valor de célula em Date
      function cellToDate(val){
        if(!val||val==='')return null;
        // cellDates:true já entrega string ISO "yyyy-mm-dd" ou Date object
        if(typeof val==='string'){
          // ISO yyyy-mm-dd
          if(/^\d{4}-\d{2}-\d{2}/.test(val)){
            const d=new Date(val+'T12:00:00');
            return isNaN(d)?null:d;
          }
          // DD/MM/YYYY
          const m=val.match(/(\d{2})\/(\d{2})\/(\d{4})/);
          if(m)return new Date(`${m[3]}-${m[2]}-${m[1]}T12:00:00`);
        }
        if(val instanceof Date&&!isNaN(val))return val;
        // número serial (fallback)
        if(typeof val==='number'){
          const d=new Date(Math.round((val-25569)*86400*1000));
          return isNaN(d)?null:d;
        }
        return null;
      }

      // Processar linhas de dados
      const dataRows=data.slice(headerRow+1).filter(r=>{
        const mat=String(r[COL.matricula]||'').trim();
        return mat&&mat.length>=3&&!/filial|centro|matricula/i.test(mat);
      });

      // Agrupar por matrícula
      const byMat={};
      dataRows.forEach(r=>{
        // Normalizar matrícula: remover zeros à esquerda e repaddar a 6
        const matRaw=String(r[COL.matricula]||'').trim();
        const mat=matRaw.padStart(6,'0');
        if(!byMat[mat])byMat[mat]=[];
        byMat[mat].push(r);
      });

      // Cruzar com funcionários cadastrados
      const encontrados=[],naoEncontrados=[];
      Object.entries(byMat).forEach(([mat,periodos])=>{
        const func=funcionarios.find(f=>{
          const fm=String(f.matricula||'').trim();
          return fm===mat||fm===mat.replace(/^0+/,'')||fm.padStart(6,'0')===mat;
        });
        if(func){
          // Parsear todos os periodos do TOTVS e ordenar do mais antigo ao mais recente
          const parsedPeriodos=periodos.map(r=>{
            const periodoStr=String(r[COL.periodoAqui]||'');
            let periodoInicio=null,periodoFim=null;
            const matchPer=periodoStr.match(/(\d{2}\/\d{2}\/\d{4})\s+(\d{2}\/\d{2}\/\d{4})/);
            if(matchPer){
              periodoInicio=new Date(`${matchPer[1].split('/').reverse().join('-')}T12:00:00`);
              periodoFim  =new Date(`${matchPer[2].split('/').reverse().join('-')}T12:00:00`);
            }
            const dtIdeal =COL.dtIdeal>=0?cellToDate(r[COL.dtIdeal]):null;
            // Calcular dt_limite_maxima = fim do período + 12 meses (CLT art. 134 — o empregado
            // tem até 12 meses após o fim do período aquisitivo para gozar as férias)
            let dtMaxima=null;
            if(periodoFim){
              dtMaxima=new Date(periodoFim);
              dtMaxima.setMonth(dtMaxima.getMonth()+12);
            }
            const diasDir =parseFloat(r[COL.totalFerias])||30;
            const diasVenc=parseFloat(r[COL.feriasVenc])||0;
            const cc      =String(r[COL.centroCusto]||'').trim();
            return{func,mat,periodoInicio,periodoFim,dtIdeal,dtMaxima,diasDir,diasVenc,
              nomeDP:String(r[COL.nome]||''),centroCusto:cc,rowRaw:r};
          }).filter(p=>p.periodoInicio);
          parsedPeriodos.sort((a,b)=>a.periodoInicio-b.periodoInicio);
          // Derivar período anterior ao mais antigo do TOTVS
          // O TOTVS só exporta períodos com saldo aberto; o período imediatamente anterior
          // (vencendo ou já vencido) precisa ser derivado para exibição correta.
          // Regra CLT: limite_máxima = fim_periodo + 11 meses
          if(parsedPeriodos.length>0){
            const maisAntigo=parsedPeriodos[0];
            const iniRef=maisAntigo.periodoInicio;
            const iniDer=new Date(iniRef);iniDer.setFullYear(iniDer.getFullYear()-1);
            const fimDer=new Date(iniRef);fimDer.setDate(fimDer.getDate()-1);
            const limDer=new Date(fimDer);limDer.setMonth(limDer.getMonth()+12);
            // Usar data_admissao do cadastro; se não cadastrada, usar da planilha (col dataAdmis)
            const admRaw=COL.dataAdmis>=0?maisAntigo.rowRaw?.[COL.dataAdmis]:null;
            const admDP=admRaw?cellToDate(admRaw):null;
            const admissaoFunc=func.data_admissao
              ? new Date(func.data_admissao+'T12:00:00')
              : admDP;
            // Derivar apenas se iniDer >= data_admissao (não criar período antes da admissão)
            const periodoValido=!admissaoFunc||(iniDer>=admissaoFunc);
            const cutoff=new Date();
            if(limDer>cutoff&&periodoValido){
              encontrados.push({func,mat,periodoInicio:iniDer,periodoFim:fimDer,
                dtIdeal:null,dtMaxima:limDer,diasDir:maisAntigo.diasDir||30,diasVenc:0,
                nomeDP:maisAntigo.nomeDP,centroCusto:maisAntigo.centroCusto,_derivado:true});
            }
          }
          // Adicionar todos os períodos do TOTVS
          parsedPeriodos.forEach(p=>encontrados.push(p));
        }else{
          const nomeDP=periodos.length>0?String(periodos[0][COL.nome]||''):'';
          const cc=periodos.length>0?String(periodos[0][COL.centroCusto]||''):'';
          naoEncontrados.push({mat,nome:nomeDP,cc,qtd:periodos.length});
        }
      });
      // Preview
      let previewHtml=`<div style="font-weight:600;margin-bottom:8px">Prévia da importação</div>`;
      previewHtml+=`<div style="display:flex;gap:12px;margin-bottom:12px">
        <div style="background:var(--success-light);color:var(--success);padding:8px 14px;border-radius:var(--radius);font-weight:600">✓ ${encontrados.length} períodos a importar</div>
        ${naoEncontrados.length>0?`<div style="background:var(--warning-light);color:var(--warning);padding:8px 14px;border-radius:var(--radius);font-weight:600">⚠ ${naoEncontrados.length} não cadastrados</div>`:''}
      </div>`;
      if(naoEncontrados.length>0){
        previewHtml+=`<div style="background:var(--warning-light);border:1px solid #FCD34D;border-radius:var(--radius);padding:12px;margin-bottom:12px">
          <div style="font-weight:600;color:var(--warning);margin-bottom:8px">⚠ Funcionários na planilha NÃO cadastrados no sistema:</div>
          <table style="width:100%;font-size:12px;border-collapse:collapse">
            <thead><tr><th style="text-align:left;padding:4px 8px;border-bottom:1px solid #FCD34D">Matrícula</th><th style="text-align:left;padding:4px 8px;border-bottom:1px solid #FCD34D">Nome</th><th style="text-align:left;padding:4px 8px;border-bottom:1px solid #FCD34D">C. Custo</th></tr></thead>
            <tbody>${naoEncontrados.map(n=>`<tr><td style="padding:4px 8px">${n.mat}</td><td style="padding:4px 8px">${n.nome}</td><td style="padding:4px 8px">${n.cc}</td></tr>`).join('')}</tbody>
          </table>
        </div>`;
      }
      document.getElementById('import-preview').innerHTML=previewHtml;
      window._importFeriasData=encontrados;
      document.getElementById('import-footer').innerHTML=`
        <button class="btn" onclick="closeModal('modal-import-ferias')">Cancelar</button>
        <button class="btn btn-primary" onclick="confirmarImportFerias()"><i class="ti ti-check"></i> Importar ${encontrados.length} períodos</button>`;
    }catch(err){
      showToast('Erro ao processar arquivo: '+err.message,'error');
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

async function confirmarImportFerias(){
  const dados=window._importFeriasData;
  if(!dados||!dados.length){showToast('Nenhum dado para importar','error');return;}
  const btn=document.querySelector('#import-footer .btn-primary');
  if(btn){btn.disabled=true;btn.textContent='Importando...';}
  let ok=0,erros=0;

  // Agrupar por funcionario_id (UUID — sem ambiguidade de formato)
  const porFuncId={};
  dados.forEach(d=>{
    const fid=d.func.id;
    if(!porFuncId[fid])porFuncId[fid]=[];
    porFuncId[fid].push(d);
  });

  for(const [funcId,periodos] of Object.entries(porFuncId)){
    // 1. Buscar todos os registros existentes pelo funcionario_id
    const{data:existentes}=await sb.from('ferias')
      .select('id,periodo_aquisitivo_inicio,programado,dias_programados,data_inicio_programada,data_fim_programada')
      .eq('funcionario_id',funcId);

    // 2. Preservar SOMENTE os períodos que já têm férias programadas
    //    (para não perder o controle de programação já lançada)
    const progMap={};
    (existentes||[]).forEach(e=>{
      if(e.programado){
        const chave=(e.periodo_aquisitivo_inicio||'').substring(0,10);
        progMap[chave]={
          programado:e.programado,
          dias_programados:e.dias_programados,
          data_inicio_programada:e.data_inicio_programada,
          data_fim_programada:e.data_fim_programada,
        };
      }
    });

    // 3. Deletar TODOS os registros existentes pelo funcionario_id (limpa duplicatas e dados velhos)
    // Usa funcionario_id direto — não depende de select anterior para garantir limpeza total
    const{error:delErr}=await sb.from('ferias').delete().eq('funcionario_id',funcId);
    if(delErr)console.error('Erro delete ferias',funcId,delErr);

    // 4. Reinserir períodos novos da planilha (TOTVS + derivado)
    for(const d of periodos){
      const perIso=toISO(d.periodoInicio);
      if(!perIso){console.warn('periodoInicio nulo para',d.mat,d);continue;}
      const fimIso=toISO(d.periodoFim);
      const limIso=toISO(d.dtMaxima);
      console.log('Inserindo',d.mat,perIso,'->',fimIso,'lim',limIso,d._derivado?'[derivado]':'[TOTVS]');
      const chave=perIso.substring(0,10);
      const prog=progMap[chave]||{};
      const payload={
        funcionario_id:funcId,
        matricula:d.mat,
        periodo_aquisitivo_inicio:perIso,
        periodo_aquisitivo_fim:toISO(d.periodoFim),
        dt_limite_ideal:toISO(d.dtIdeal),
        dt_limite_maxima:toISO(d.dtMaxima),
        dias_direito:d.diasDir,
        dias_vencidos:d.diasVenc,
        importado_em:new Date().toISOString(),
        programado:prog.programado||false,
        dias_programados:prog.dias_programados||null,
        data_inicio_programada:prog.data_inicio_programada||null,
        data_fim_programada:prog.data_fim_programada||null,
      };
      const{error}=await sb.from('ferias').insert(payload);
      if(error){erros++;console.error('Erro import',funcId,error);}
      else ok++;
    }
  }

  if(erros>0)showToast(`${ok} importados, ${erros} com erro`,'error');
  else showToast(`${ok} períodos importados com sucesso!`);
  closeModal('modal-import-ferias');
  await loadFerias();
  renderFerias();
}

function exportFeriasExcel(){
  const hoje=new Date();hoje.setHours(0,0,0,0);

  // Agrupar por matrícula igual ao render
  const byMat={};
  feriasData.forEach(f=>{
    const mat=f.matricula||'?';
    if(!byMat[mat])byMat[mat]=[];
    byMat[mat].push(f);
  });
  Object.values(byMat).forEach(arr=>arr.sort((a,b)=>{
    const da=parseDate(a.periodo_aquisitivo_inicio)||new Date(0);
    const db=parseDate(b.periodo_aquisitivo_inicio)||new Date(0);
    return da-db;
  }));

  // Filtrar só alertas (vencido ou vencendo 60d no período mais urgente)
  function getPeriodoUrgenteExp(arr){return arr.find(f=>!f.programado)||null;}
  function getStatusExp(arr){
    const p=getPeriodoUrgenteExp(arr);if(!p)return'ok';
    const lim=parseDate(p.dt_limite_maxima);
    if(lim&&lim<hoje)return'vencida';
    if(lim){const d=Math.floor((lim-hoje)/86400000);if(d>=0&&d<=60)return'vencendo';}
    return'ok';
  }

  let listaAlerta=Object.values(byMat).filter(arr=>['vencida','vencendo'].includes(getStatusExp(arr)));

  // feriasBase já está filtrado por obra via obraFiltroAtivo

  // Ordenar: vencidas → vencendo → data mais próxima
  listaAlerta.sort((a,b)=>{
    const ord={vencida:0,vencendo:1};
    const sa=ord[getStatusExp(a)]??1,sb=ord[getStatusExp(b)]??1;
    if(sa!==sb)return sa-sb;
    const la=parseDate(getPeriodoUrgenteExp(a)?.dt_limite_maxima)||new Date(9999,0);
    const lb=parseDate(getPeriodoUrgenteExp(b)?.dt_limite_maxima)||new Date(9999,0);
    return la-lb;
  });

  if(!listaAlerta.length){showToast('Nenhum funcionário em alerta para exportar.','error');return;}

  // Agrupar por obra para abas separadas
  const porObra={};
  listaAlerta.forEach(arr=>{
    const obraKey=arr[0].funcionario?.obra?.codigo
      ?`${arr[0].funcionario.obra.codigo} — ${arr[0].funcionario.obra.nome||''}`.trim()
      :'Sem Obra';
    if(!porObra[obraKey])porObra[obraKey]=[];
    porObra[obraKey].push(arr);
  });

  const wb=XLSX.utils.book_new();
  const dataEmissao=new Date().toLocaleDateString('pt-BR');

  Object.entries(porObra).forEach(([obraKey,funcs])=>{
    const rows=[];

    // Cabeçalho do relatório
    rows.push([`RELATÓRIO DE FÉRIAS EM ALERTA — ${obraKey.toUpperCase()}`,'','','','','','','','','']);
    rows.push([`Emitido em: ${dataEmissao}  ·  ${funcs.length} funcionário(s) em alerta`,'','','','','','','','','']);
    rows.push([]);

    // Cabeçalho da tabela
    rows.push([
      'FUNCIONÁRIO','MATRÍCULA','CENTRO DE CUSTO',
      'PER. AQUISITIVO URGENTE','LIMITE MÁX. LEGAL','DIAS RESTANTES','STATUS',
      '2º PERÍODO (se houver)','LIMITE MÁX. 2º PER.',
      'PROGRAMAÇÃO'
    ]);

    funcs.forEach(arr=>{
      const f0=arr[0];
      const nome=f0.funcionario?.nome_completo||f0.matricula||'—';
      const mat=f0.matricula||'—';
      const cc=f0.funcionario?.obra?.centro_custo||'—';
      const per1=arr[0];
      const per2=arr[1]||null;
      const pUrgente=getPeriodoUrgenteExp(arr);
      const limMax=parseDate(pUrgente?.dt_limite_maxima);
      const dM=limMax?Math.floor((limMax-hoje)/86400000):null;
      const status=dM===null?'—':dM<0?`VENCIDA (${Math.abs(dM)}d atrás)`:`VENCENDO (${dM}d)`;
      const perAquiUrgente=pUrgente?`${formatDate(pUrgente.periodo_aquisitivo_inicio)} → ${formatDate(pUrgente.periodo_aquisitivo_fim)}`:'—';

      // 2º período — real ou projetado
      const per2real=arr[1]||null;
      let per2exp=per2real;
      if(!per2exp&&per1){
        const fimP1=parseDate(per1.periodo_aquisitivo_fim);
        if(fimP1){
          const ini2=new Date(fimP1);ini2.setDate(ini2.getDate()+1);
          const fim2=new Date(ini2);fim2.setFullYear(fim2.getFullYear()+1);fim2.setDate(fim2.getDate()-1);
          const lm1=parseDate(per1.dt_limite_maxima);
          const lm2=lm1?new Date(lm1.getFullYear()+1,lm1.getMonth(),lm1.getDate()):null;
          per2exp={periodo_aquisitivo_inicio:toISO(ini2),periodo_aquisitivo_fim:toISO(fim2),dt_limite_maxima:toISO(lm2),_projetado:true};
        }
      }
      const per2Str=per2exp?`${formatDate(per2exp.periodo_aquisitivo_inicio)} → ${formatDate(per2exp.periodo_aquisitivo_fim)}`:'—';
      const per2Lim=per2exp?formatDate(per2exp.dt_limite_maxima):'—';

      // Programação
      const prog=arr.filter(f=>f.programado).map(f=>`${f.dias_programados||'?'}d: ${formatDate(f.data_inicio_programada)} → ${formatDate(f.data_fim_programada)}`).join(' | ')||'Não programada';

      rows.push([nome,mat,cc,perAquiUrgente,formatDate(limMax),dM===null?'—':dM<0?`${Math.abs(dM)}d atrás`:`${dM}d`,status,per2Str,per2Lim,prog]);
    });

    const ws=XLSX.utils.aoa_to_sheet(rows);

    // Larguras das colunas
    ws['!cols']=[{wch:32},{wch:12},{wch:16},{wch:26},{wch:18},{wch:14},{wch:22},{wch:26},{wch:18},{wch:34}];

    // Mesclar título
    ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:9}},{s:{r:1,c:0},e:{r:1,c:9}}];

    // Nome da aba: máx 31 chars, sem caracteres inválidos
    const abaName=obraKey.replace(/[\\/:?*[\]]/g,'').substring(0,31);
    XLSX.utils.book_append_sheet(wb,ws,abaName||'Obras');
  });

  // Aba resumo se houver múltiplas obras
  if(Object.keys(porObra).length>1){
    const resumoRows=[
      [`RESUMO GERAL — FÉRIAS EM ALERTA`,'','',''],
      [`Emitido em: ${dataEmissao}`,'','',''],
      [],
      ['OBRA / C. CUSTO','VENCIDAS','VENCENDO 60d','TOTAL ALERTA'],
    ];
    Object.entries(porObra).forEach(([obraKey,funcs])=>{
      const venc=funcs.filter(a=>getStatusExp(a)==='vencida').length;
      const vendo=funcs.filter(a=>getStatusExp(a)==='vencendo').length;
      resumoRows.push([obraKey,venc,vendo,venc+vendo]);
    });
    const wsRes=XLSX.utils.aoa_to_sheet(resumoRows);
    wsRes['!cols']=[{wch:40},{wch:12},{wch:14},{wch:14}];
    wsRes['!merges']=[{s:{r:0,c:0},e:{r:0,c:3}},{s:{r:1,c:0},e:{r:1,c:3}}];
    XLSX.utils.book_append_sheet(wb,wsRes,'RESUMO');
  }

  const obraLabel=feriasObraFiltro?`_${feriasObraFiltro}`:'_TodasObras';
  XLSX.writeFile(wb,`Ferias_Alerta${obraLabel}_${dataEmissao.replace(/\//g,'-')}.xlsx`);
  showToast(`Excel exportado — ${listaAlerta.length} funcionário(s) em alerta!`);
}

function exportFeriasPDF(){
  const{jsPDF}=window.jspdf;const doc=new jsPDF('l');
  const hoje=new Date();hoje.setHours(0,0,0,0);
  doc.setFillColor(15,110,86);doc.rect(0,0,297,30,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(16);doc.setFont('helvetica','bold');
  doc.text('Empresa Modelo S.A. — Controle de Férias',14,12);doc.setFontSize(10);doc.setFont('helvetica','normal');
  doc.text(`Emitido em ${new Date().toLocaleDateString('pt-BR')} · ${feriasData.length} períodos`,14,22);
  let y=40;
  const headers=['Funcionário','Matrícula','Limite Ideal','Limite Máximo','Dias','Status'];
  const widths=[70,25,30,30,15,35];
  doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(107,114,128);
  let x=14;headers.forEach((h,i)=>{doc.text(h,x,y);x+=widths[i];});y+=6;
  doc.setDrawColor(229,231,235);doc.line(14,y,283,y);y+=4;
  doc.setFont('helvetica','normal');doc.setFontSize(9);
  feriasData.slice(0,40).forEach(f=>{
    const lim2=parseDate(f.dt_limite_maxima);
    let status=f.programado?'Programada':lim2&&lim2<hoje?'Vencida':'OK';
    doc.setTextColor(26,26,26);
    x=14;
    const cols=[
      (f.funcionario?.nome_completo||f.matricula||'').substring(0,28),
      f.matricula||'—',
      formatDate(f.dt_limite_ideal),
      formatDate(f.dt_limite_maxima),
      String(f.dias_direito||30),
      status
    ];
    if(status==='Vencida')doc.setTextColor(226,75,74);
    else if(status==='Programada')doc.setTextColor(59,109,17);
    else doc.setTextColor(26,26,26);
    cols.forEach((c,i)=>{doc.text(c,x,y);x+=widths[i];});
    y+=7;if(y>190){doc.addPage();y=20;}
  });
  doc.save('Controle_Ferias.pdf');showToast('PDF exportado!');
}

function toggleSenhaModal(){
  const inp=document.getElementById('u-senha');
  const icon=document.getElementById('u-senha-eye');
  if(!inp||!icon)return;
  if(inp.type==='password'){inp.type='text';icon.className='ti ti-eye-off';}
  else{inp.type='password';icon.className='ti ti-eye';}
}

function toggleSenha(id, hash){
  const el=document.getElementById('pw-'+id);
  const eye=document.getElementById('eye-'+id);
  if(el.textContent==='••••••••'){
    try{el.textContent=hash||'sem senha';}catch(e){el.textContent='(erro)';}
    eye.className='ti ti-eye-off';
  } else {
    el.textContent='••••••••';
    eye.className='ti ti-eye';
  }
}

async function salvarUsuario(id){
  const nome=document.getElementById('u-nome').value.trim();
  const email=document.getElementById('u-email').value.trim();
  const senha=document.getElementById('u-senha').value;
  const nivel=document.getElementById('u-nivel').value;
  const ativo=document.getElementById('u-ativo').value==='true';
  const obrasAcesso=[...document.querySelectorAll('.u-obra-chk:checked')].map(c=>c.value);
  if(!nome||!email){showToast('Nome e usuário são obrigatórios','error');return;}
  if(!senha){showToast('Senha é obrigatória','error');return;}
  const payload={nome,usuario:email,perfil:nivel,senha,obras_acesso:obrasAcesso,ativo};
  let error;
  if(id){({error}=await sb.from('usuarios_acesso').update(payload).eq('id',id));}
  else{({error}=await sb.from('usuarios_acesso').insert({...payload,}));}
  if(error){showToast('Erro: '+error.message,'error');return;}
  showToast(id?'Usuário atualizado!':'Usuário criado!');closeModal('modal-usuario');renderUsuarios();
}

async function toggleUsuarioAtivo(id,novoStatus,nome){

  if(error){showToast('Erro: '+error.message,'error');return;}

}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function closeModal(id){
  const el=document.getElementById(id);
  if(el)el.remove();
}


function insertModal(id,html){
  const old=document.getElementById(id);if(old)old.remove();
  document.body.insertAdjacentHTML('beforeend',`<div class="modal-overlay" id="${id}" onclick="if(event.target===this)closeModal('${id}')">${html}</div>`);
}

function renderAlojamentos(){
  const hoje=new Date();hoje.setHours(0,0,0,0);
  const alojsFiltrados=(()=>{
    let lista=globalObraFiltro?alojamentos.filter(a=>a.obra_id===globalObraFiltro):alojamentos;
    const _mes=new Date().getMonth()+1;const _ano=new Date().getFullYear();
    if(alojFiltroAtivo==='contratos_vencidos'){
      const _hj=new Date();_hj.setHours(0,0,0,0);
      lista=lista.filter(a=>{const d=parseDate(a.data_termino);return d&&d<_hj;});
    } else if(alojFiltroAtivo==='contratos_vencendo'){
      const _hj=new Date();_hj.setHours(0,0,0,0);
      lista=lista.filter(a=>{const d=parseDate(a.data_termino);if(!d)return false;const diff=Math.floor((d-_hj)/86400000);return diff>=0&&diff<=60;});
    } else if(alojFiltroAtivo==='nao_lancadas'){
      const _obrig=['agua','energia','gas','condominio'];
      lista=lista.filter(a=>{
        const tiposLanc=new Set(alojamentosContas.filter(c=>String(c.alojamento_id)===String(a.id)&&c.mes===_mes&&c.ano===_ano).map(c=>c.tipo));
        return _obrig.some(t=>!tiposLanc.has(t)&&!a['isenta_'+t]);
      });
    }
    return lista;
  })();
  const totalVagas=alojsFiltrados.reduce((s,a)=>s+(a.vagas_total||0),0);
  const totalOcup=funcionarios.filter(f=>f.alojamento_id&&f.situacao!=='inativo').length;
  const totalDisp=totalVagas-totalOcup;
  const totalAluguel=alojsFiltrados.reduce((s,a)=>s+Number(a.custo_mensal||0)+Number(a.condominio||0)+Number(a.iptu||0)+Number(a.seguro||0),0);
  const totalCaucao=alojsFiltrados.reduce((s,a)=>s+Number(a.caucao||0),0);
  const totalContas=alojamentosContas.filter(c=>c.mes===hoje.getMonth()+1&&c.ano===hoje.getFullYear()).reduce((s,c)=>s+Number(c.valor||0),0);

  // Vencimentos próximos (60 dias)
  const vencProx=alojsFiltrados.filter(a=>{const d=parseDate(a.data_termino);return d&&Math.floor((d-hoje)/86400000)<=60&&Math.floor((d-hoje)/86400000)>=0;}).length;
  const vencidos=alojsFiltrados.filter(a=>{const d=parseDate(a.data_termino);return d&&d<hoje;}).length;

  // ─── Tabela agrupada por obra ─────────────────────────────────────────────
  const _mesTabela=tabelaMesFiltro||hoje.getMonth()+1;
  const _anoTabela=tabelaAnoFiltro||hoje.getFullYear();
  const _mesesNomes=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const _mesLabel=_mesesNomes[_mesTabela-1]+'/'+_anoTabela;
  const _contasObrigTab=['agua','energia','gas','condominio'];
  const _nomesTab={agua:'Água',energia:'Energia',gas:'Gás',condominio:'Condomínio'};
  const _labTab={agua:'💧',energia:'⚡',gas:'🔥',condominio:'🏢'};

  const _byObra={};
  alojsFiltrados.forEach(a=>{
    const obraKey=a.obra?.codigo?(a.obra.codigo+' — '+a.obra.nome):'Sem obra vinculada';
    if(!_byObra[obraKey])_byObra[obraKey]=[];
    _byObra[obraKey].push(a);
  });

  const tabelaAlojamentos=Object.keys(_byObra).length===0
    ?'<div style="text-align:center;padding:40px;color:var(--text-muted)"><i class="ti ti-home-off" style="font-size:48px;display:block;margin-bottom:12px;opacity:.3"></i>Nenhum alojamento cadastrado</div>'
    :Object.entries(_byObra).map(([obraKey,lista])=>{
      const linhas=lista.map(a=>{
        const moradores=funcionarios.filter(f=>String(f.alojamento_id)===String(a.id)&&f.situacao!=='inativo').length;
        const total=a.vagas_total||0;
        const disp=total-moradores;
        const pct=total?Math.round(moradores/total*100):0;
        const termino=parseDate(a.data_termino);
        const diasTerm=termino?Math.floor((termino-hoje)/86400000):null;
        const contasMes=alojamentosContas.filter(c=>String(c.alojamento_id)===String(a.id)&&c.mes===_mesTabela&&c.ano===_anoTabela);
        const custoMes=contasMes.reduce((s,c)=>s+Number(c.valor||0),0)+Number(a.custo_mensal||0)+Number(a.condominio||0)+Number(a.iptu||0)+Number(a.seguro||0);
        const pendMes=contasMes.filter(c=>c.status==='pendente').length;
        const tiposLanc=new Set(contasMes.map(c=>c.tipo));
        const isentas=new Set(_contasObrigTab.filter(t=>a['isenta_'+t]));
        const faltando=_contasObrigTab.filter(t=>!tiposLanc.has(t)&&!isentas.has(t));
        const relMes=alojamentosRelatorios.find(r=>String(r.alojamento_id)===String(a.id)&&r.mes===_mesTabela&&r.ano===_anoTabela);
        const relTip=relMes?'Relatório ADM 31 — recebido em '+(relMes.data_recebimento?formatDate(relMes.data_recebimento):'—'):'Relatório ADM 31 — não recebido';
        const relPill='<span onclick="openModalRelatorios(\''+a.id+'\','+_mesTabela+','+_anoTabela+')" title="'+relTip+'" style="font-size:15px;cursor:pointer;padding:3px 5px;border-radius:6px;background:'+(relMes?'var(--success-light)':'#FEE2E2')+';opacity:'+(relMes?'1':'0.4')+'">📋</span>';

        const contasPills=_contasObrigTab.map(t=>{
          if(isentas.has(t))return '<span title="'+_nomesTab[t]+' isento" style="font-size:18px;opacity:.25;cursor:default">'+_labTab[t]+'</span>';
          const lanc=tiposLanc.has(t);
          const tip=_nomesTab[t]+(lanc?' — Lançado':' — Não lançado');
          const op=lanc?'1':'0.3';
          const bg=lanc?'var(--success-light)':'#FEE2E2';
          return '<span onclick="openModalContas(\"'+a.id+'\",'+_mesTabela+','+_anoTabela+',\"'+t+'\")" title="'+tip+'" style="font-size:15px;cursor:pointer;padding:3px 5px;border-radius:6px;background:'+bg+';opacity:'+op+'">'+_labTab[t]+'</span>';
        }).join('');

        const termBadge=diasTerm===null?'<span style="color:var(--text-muted);font-size:12px">—</span>'
          :diasTerm<0?'<span class="badge badge-red" style="font-size:11px">Vencido '+Math.abs(diasTerm)+'d</span>'
          :diasTerm<=60?'<span class="badge badge-amber" style="font-size:11px">'+formatDate(a.data_termino)+' ('+diasTerm+'d)</span>'
          :'<span style="font-size:12px;color:var(--text-muted)">'+formatDate(a.data_termino)+'</span>';

        const vagasCell='<div style="display:flex;align-items:center;gap:6px">'
          +'<span style="font-size:13px;font-weight:600;color:'+(disp===0?'var(--danger)':disp<=2?'var(--warning)':'var(--text)')+'">'+moradores+'<span style="font-weight:400;color:var(--text-muted)">/'+total+'</span></span>'
          +'<div style="width:44px;height:5px;background:var(--border);border-radius:3px"><div style="height:5px;border-radius:3px;background:'+(pct>=100?'var(--danger)':pct>=80?'var(--warning)':'var(--primary)')+';width:'+pct+'%"></div></div>'
          +'</div>';

        return '<tr id="aloj-row-'+a.id+'" style="border-bottom:1px solid var(--border);transition:background .4s">'
          +'<td style="padding:10px 14px"><div style="font-weight:500;font-size:13px">'+a.nome+'</div>'+(a.imobiliaria?'<div style="font-size:11px;color:var(--text-muted)">'+a.imobiliaria+'</div>':'')+'</td>'
          +'<td style="padding:10px 14px">'+vagasCell+'</td>'
          +'<td style="padding:10px 14px">'+termBadge+'</td>'
          +'<td style="padding:10px 14px"><div style="font-size:13px;font-weight:500">R$ '+custoMes.toLocaleString('pt-BR',{minimumFractionDigits:2})+'</div></td>'
          +'<td style="padding:10px 14px" id="section-pendentes"><div style="display:flex;gap:4px;align-items:center">'+contasPills+'</div>'+(faltando.length?'<div style="font-size:10px;color:#DC2626;margin-top:2px">'+faltando.length+' não lançada(s)</div>':'<div style="font-size:10px;color:var(--success)">Completo</div>')+'</td>'
          +'<td style="padding:10px 14px">'+relPill+(relMes?'':'<div style="font-size:10px;color:#DC2626;margin-top:2px">Pendente</div>')+'</td>'
          +'<td style="padding:8px 14px;white-space:nowrap">'
          +'<button class="btn btn-sm" title="Moradores" onclick="openModalMoradores(&apos;'+ a.id +'&apos;)"><i class="ti ti-users"></i></button> '
          +'<button class="btn btn-sm" title="Contas" onclick="openModalContas(&apos;'+ a.id +'&apos;)"><i class="ti ti-receipt"></i></button> '
          +'<button class="btn btn-sm" title="Relatório ADM 31" onclick="openModalRelatorios(&apos;'+ a.id +'&apos;)"><i class="ti ti-clipboard-check"></i></button> '
          +'<button class="btn btn-sm" title="Editar" onclick="openModalAlojamento(&apos;'+ a.id +'&apos;)"><i class="ti ti-edit"></i></button> '
          +'<button class="btn btn-sm btn-danger" title="Excluir" onclick="deleteAlojamento(&apos;'+ a.id +'&apos;,&apos;'+(a.nome||'').replace(/&apos;/g,'\\&apos;')+'&apos;)"><i class="ti ti-trash"></i></button>'
          +'</td></tr>';
      }).join('');

      const obraTotal=lista.reduce((s,a)=>s+(a.vagas_total||0),0);
      const obraOcup=lista.reduce((s,a)=>s+funcionarios.filter(f=>String(f.alojamento_id)===String(a.id)&&f.situacao!=='inativo').length,0);
      const obraCusto=lista.reduce((s,a)=>{
        const cm=alojamentosContas.filter(c=>String(c.alojamento_id)===String(a.id)&&c.mes===_mesTabela&&c.ano===_anoTabela).reduce((ss,c)=>ss+Number(c.valor||0),0);
        return s+cm+Number(a.custo_mensal||0)+Number(a.condominio||0)+Number(a.iptu||0)+Number(a.seguro||0);

      return '<div class="table-container" style="margin-bottom:16px">'

        +'<span style="font-size:12px;color:var(--text-muted)">'+lista.length+' aloj. &nbsp;·&nbsp; '+obraOcup+'/'+obraTotal+' vagas &nbsp;·&nbsp; <strong>R$ '+obraCusto.toLocaleString('pt-BR',{minimumFractionDigits:2})+'</strong>/mês</span>'
        +'</div>'
        +'<table><thead><tr>'
        +'<th>Alojamento</th>'
        +'<th>Vagas</th>'
        +'<th style="min-width:120px">Contrato</th>'
        +'<th>Custo '+_mesLabel+'</th>'
        +'<th>Contas '+_mesLabel+'</th>'
        +'<th>ADM 31 '+_mesLabel+'</th>'
        +'<th>Ações</th>'
        +'</tr></thead><tbody>'+linhas+'</tbody></table></div>';
    }).join('');

  // Calcular alojamentos sem contas obrigatórias para o banner
  const _contasObrig=['agua','energia','gas','condominio'];
  const _contasObrigLabel={agua:'💧 Água',energia:'⚡ Energia',gas:'🔥 Gás',condominio:'🏢 Condomínio'};
  const _mesAtual=hoje.getMonth()+1;const _anoAtual=hoje.getFullYear();
  const _alojSemContas=alojsFiltrados.map(a=>{
    const contasMesAloj=alojamentosContas.filter(c=>String(c.alojamento_id)===String(a.id)&&c.mes===_mesAtual&&c.ano===_anoAtual);
    const tiposLancados=new Set(contasMesAloj.map(c=>c.tipo));
    const faltando=_contasObrig.filter(t=>!tiposLancados.has(t)&&!a['isenta_'+t]);
    return{...a,faltando};
  }).filter(a=>a.faltando.length>0);

  // Filtros do banner (persistidos como variáveis globais na página)
  if(typeof window._bannerMes==='undefined'){window._bannerMes=_mesAtual;window._bannerAno=_anoAtual;}
  const _bmLabel=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][_mesAtual-1]+'/'+_anoAtual;

  // Agrupar por obra para o banner
  const _obrasSemContas=[...new Set(_alojSemContas.map(a=>a.obra?.codigo?(a.obra.codigo+' — '+a.obra.nome):'Sem obra'))];
  const _listaFiltrada=bannerFiltroObra?_alojSemContas.filter(a=>(a.obra?.codigo?(a.obra.codigo+' — '+a.obra.nome):'Sem obra')===bannerFiltroObra):_alojSemContas;

  const bannerSemContas=_alojSemContas.length>0?(()=>{

      +'<i class="ti ti-alert-circle" style="font-size:18px;color:#B45309;flex-shrink:0"></i>'
      +'<strong style="color:#92400E;font-size:13px">'+_alojSemContas.length+' alojamento(s) com contas não lançadas em '+_bmLabel+'</strong>'
      +'<div style="margin-left:auto;display:flex;align-items:center;gap:6px">'
      +'<span style="font-size:11px;color:#92400E;opacity:.6">'+(bannerNaoLancadasAberto?'fechar':'ver detalhes')+'</span>'
      +'<i class="ti ti-chevron-'+(bannerNaoLancadasAberto?'up':'down')+'" style="color:#B45309;font-size:15px"></i>'

    if(!bannerNaoLancadasAberto)return '<div style="background:#FFF7ED;border:1px solid #FCD34D;border-radius:var(--radius);margin-bottom:8px;overflow:hidden">'+headerHtml+'</div>';

    const filtroObrasHtml='<div style="padding:8px 14px;border-bottom:1px solid #FDE68A;display:flex;align-items:center;gap:6px;flex-wrap:wrap;background:#FFFBEB">'

      +_obrasSemContas.map(o=>{

  const bannerSemRelatorio=_alojSemRelatorio.length>0?(()=>{

            _todas.forEach(a=>{
              const k=a.obra?.codigo||(a.obra?.nome||'Sem obra');
              if(!_obrasMap[k])_obrasMap[k]={vagas:0,ocup:0,custo:0,nome:a.obra?.nome||'Sem obra',id:a.obra_id};
              _obrasMap[k].vagas+=a.vagas_total||0;
              _obrasMap[k].ocup+=funcionarios.filter(f=>String(f.alojamento_id)===String(a.id)&&f.situacao!=='inativo').length;
              _obrasMap[k].custo+=Number(a.custo_mensal||0)+Number(a.condominio||0)+Number(a.iptu||0)+Number(a.seguro||0);
            });
            return Object.entries(_obrasMap).map(([cod,o])=>{
              const pct=o.vagas?Math.round(o.ocup/o.vagas*100):0;
              const cor=pct>=100?'var(--danger)':pct>=80?'var(--warning)':'var(--primary)';

                +'<div style="font-size:12px;font-weight:600;color:var(--primary-dark);margin-bottom:6px">'+cod+'</div>'
                +'<div style="display:flex;gap:16px;font-size:12px">'
                +'<div><span style="color:var(--text-muted)">Vagas </span><strong>'+o.ocup+'/'+o.vagas+'</strong></div>'
                +'<div><span style="color:var(--text-muted)">Custo </span><strong>R$ '+o.custo.toLocaleString('pt-BR',{minimumFractionDigits:2})+'</strong></div>'
                +'</div>'
                +'<div style="margin-top:6px;height:4px;background:var(--border);border-radius:2px"><div style="height:4px;border-radius:2px;background:'+cor+';width:'+pct+'%"></div></div>'
                +'</div>';
            }).join('');
          })()}
        </div>
      </div>
    </div>
    <!-- Seletor de mês para tabela -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <span style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px">Visualizar mês:</span>
      ${(()=>{
        const _meses=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
        const _hj=new Date();
        const opts=[];
        for(let i=5;i>=-1;i--){
          const d=new Date(_hj.getFullYear(),_hj.getMonth()-i,1);
          const m=d.getMonth()+1;const y=d.getFullYear();
          const sel=(tabelaMesFiltro||_hj.getMonth()+1)===m&&(tabelaAnoFiltro||_hj.getFullYear())===y;
          opts.push('<button onclick="tabelaMesFiltro='+m+';tabelaAnoFiltro='+y+';renderAlojamentos()" style="font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid '+(sel?'var(--primary)':'var(--border)')+';background:'+(sel?'var(--primary)':'var(--surface)')+';color:'+(sel?'#fff':'var(--text-muted)')+';cursor:pointer;font-weight:'+(sel?'600':'400')+'">'+_meses[m-1]+'/'+y+'</button>');
        }
        return opts.join('');
      })()}
    </div>

    ${tabelaAlojamentos}`;
}

async function saveAlojamento(id){
  const nome=document.getElementById('aloj-nome').value.trim();
  if(!nome){showToast('Nome é obrigatório','error');return;}

  // Upload PDFs se selecionados
  async function uploadPDF(inputId,folder){
    const input=document.getElementById(inputId);
    if(!input||!input.files||!input.files[0])return null;
    const file=input.files[0];
    const path=`${folder}/${Date.now()}_${file.name.replace(/\s/g,'_')}`;
    const{error}=await sb.storage.from('alojamentos').upload(path,file,{contentType:'application/pdf',upsert:true});
    if(error){showToast('Erro no upload: '+error.message,'error');return null;}
    return sb.storage.from('alojamentos').getPublicUrl(path).data.publicUrl;
  }

  const existente=id?alojamentos.find(x=>x.id===id):null;
  const contratoUrl=await uploadPDF('aloj-contrato-file','contratos')||existente?.contrato_url||null;
  const laudoUrl=await uploadPDF('aloj-laudo-file','laudos')||existente?.laudo_url||null;
  const fotosUrl=await uploadPDF('aloj-fotos-file','fotos')||existente?.fotos_url||null;

  function parseBRL(v){if(!v&&v!==0)return null;const s=String(v).trim();if(s.includes(',')){return parseFloat(s.replace(/\./g,'').replace(',','.'))||null;}return parseFloat(s)||null;}
  const payload={
    nome,
    obra_id:document.getElementById('aloj-obra').value||null,
    endereco:document.getElementById('aloj-end').value.trim()||null,
    vagas_total:parseInt(document.getElementById('aloj-vagas').value)||null,
    imobiliaria:document.getElementById('aloj-imob').value.trim()||null,
    contato_imobiliaria:document.getElementById('aloj-contato').value.trim()||null,
    custo_mensal:parseBRL(document.getElementById('aloj-aluguel').value),
    condominio:parseBRL(document.getElementById('aloj-cond').value),
    iptu:parseBRL(document.getElementById('aloj-iptu').value),
    seguro:parseBRL(document.getElementById('aloj-seguro').value),
    caucao:parseBRL(document.getElementById('aloj-caucao').value),
    data_inicio:document.getElementById('aloj-inicio').value||null,
    data_termino:document.getElementById('aloj-termino').value||null,
    isencao_meses:parseInt(document.getElementById('aloj-isencao').value)||null,
    indice_reajuste:document.getElementById('aloj-indice').value.trim()||null,
    observacoes:document.getElementById('aloj-obs').value.trim()||null,
    isenta_agua:document.getElementById('isenta-agua')?.checked||false,
    isenta_energia:document.getElementById('isenta-energia')?.checked||false,
    isenta_gas:document.getElementById('isenta-gas')?.checked||false,
    isenta_condominio:document.getElementById('isenta-condominio')?.checked||false,
    contrato_url:contratoUrl,
    laudo_url:laudoUrl,
    fotos_url:fotosUrl,
  };
  const{error}=id?await sb.from('alojamentos').update(payload).eq('id',id):await sb.from('alojamentos').insert(payload);
  if(error){showToast('Erro: '+error.message,'error');return;}
  showToast(id?'Alojamento atualizado!':'Alojamento cadastrado!');
  closeModal('modal-aloj');await loadAlojamentos();renderAlojamentos();
}

async function deleteAlojamento(id,nome){
  if(!confirm(`Excluir alojamento "${nome}"?`))return;
  const{error}=await sb.from('alojamentos').delete().eq('id',id);
  if(error){showToast('Erro: '+error.message,'error');return;}
  showToast('Alojamento excluído.');await loadAlojamentos();renderAlojamentos();
}

async function saveConta(alojId){
  const mes=parseInt(document.getElementById('c-mes').value);
  const ano=parseInt(document.getElementById('c-ano').value);
  const tipo=document.getElementById('c-tipo').value;
  const valorRaw=document.getElementById('c-valor').value;
  const valor=parseFloat(String(valorRaw).replace(',','.'));
  const adm35Num=(document.getElementById('c-adm35-num').value||'').trim();
  const adm35Data=document.getElementById('c-adm35-data').value||null;
  console.log('[saveConta] alojId=',alojId,'mes=',mes,'ano=',ano,'tipo=',tipo,'valor=',valor,'valorRaw=',valorRaw);
  if(valorRaw===''||isNaN(valor)){showToast('Informe o valor','error');return;}
  if(!alojId||alojId==='undefined'||alojId==='null'){showToast('Erro: ID do alojamento inválido: '+alojId,'error');return;}
  if(!mes||!ano){showToast('Mês/ano inválido: mes='+mes+' ano='+ano,'error');return;}
  const payload={alojamento_id:alojId,mes,ano,tipo,valor:Number(valor),adm35_numero:adm35Num||null,adm35_envio:adm35Data};
  console.log('[saveConta] payload=',JSON.stringify(payload));
  const res=await sb.from('alojamentos_contas').insert(payload);
  console.log('[saveConta] res=',res);
  if(res.error){
    console.error('Erro saveConta:',res.error);
    showToast('Erro: '+res.error.message+' | code: '+res.error.code,'error');
    return;
  }
  showToast('Conta lançada! ✓');
  await loadAlojamentos();
  closeModal('modal-contas');
  openModalContas(alojId,mes,ano,tipo);
  renderAlojamentos();
}

async function editarAdm35Click(btn){
  const id=btn.dataset.id;
  const alojId=btn.dataset.alojid;
  const mes=btn.dataset.mes;
  const ano=btn.dataset.ano;
  const numAtual=btn.dataset.num||'';
  const dataAtual=btn.dataset.data||'';
  const num=prompt('Nº da ADM 35:',numAtual);
  if(num===null)return;
  const dataAtualBr=dataAtual?dataAtual.split('-').reverse().join('/'):'';
  const dataEnvio=prompt('Data do envio (dd/mm/aaaa):',dataAtualBr);
  if(dataEnvio===null)return;
  let dataIso=null;
  if(dataEnvio.trim()){
    const m=dataEnvio.trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if(!m){showToast('Data inválida, use dd/mm/aaaa','error');return;}
    dataIso=m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');
  }
  const res=await sb.from('alojamentos_contas').update({adm35_numero:num.trim()||null,adm35_envio:dataIso}).eq('id',id);
  if(res.error){
    console.error('Erro editarAdm35:',res.error);
    showToast('Erro: '+res.error.message,'error');
    return;
  }
  showToast('ADM 35 atualizada! ✓');
  await loadAlojamentos();
  openModalContas(alojId,parseInt(mes),parseInt(ano));
}

function exportAlojamentosExcel(){
  const hoje=new Date();
  const rows=[];
  rows.push(['RELATÓRIO DE ALOJAMENTOS — EMPRESA MODELO S.A.','','','','','','','','']);
  rows.push([`Emitido em: ${hoje.toLocaleDateString('pt-BR')}  ·  ${alojamentos.length} alojamento(s)`,'','','','','','','','']);
  rows.push([]);
  rows.push(['NOME','ENDEREÇO','OBRA','VAGAS','OCUPADAS','DISPONÍVEIS','ALUGUEL','INÍCIO','TÉRMINO','IMOBILIÁRIA','ADM 31 ('+(hoje.getMonth()+1)+'/'+hoje.getFullYear()+')']);
  alojamentos.forEach(a=>{
    const ocup=funcionarios.filter(f=>String(f.alojamento_id)===String(a.id)&&f.situacao!=='inativo').length;
    const relMesAtual=alojamentosRelatorios.find(r=>String(r.alojamento_id)===String(a.id)&&r.mes===hoje.getMonth()+1&&r.ano===hoje.getFullYear());
    const admStatus=relMesAtual?('Recebido '+formatDate(relMesAtual.data_recebimento)):'Pendente';
    rows.push([a.nome||'—',a.endereco||'—',a.obra?.codigo||'—',a.vagas_total||0,ocup,(a.vagas_total||0)-ocup,a.custo_mensal||0,formatDate(a.data_inicio),formatDate(a.data_termino),a.imobiliaria||'—',admStatus]);
  });
  rows.push([]);
  rows.push(['MORADORES POR ALOJAMENTO','','','','','','','','','']);
  alojamentos.forEach(a=>{
    const moradores=funcionarios.filter(f=>String(f.alojamento_id)===String(a.id)&&f.situacao!=='inativo');
    if(moradores.length){
      rows.push([a.nome,'NOME','MATRÍCULA','FUNÇÃO','','','','','','']);
      moradores.forEach((f,i)=>rows.push(['',f.nome_completo,f.matricula,f.funcao?.nome||'—','','','','','','']));
    }
  });
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:28},{wch:40},{wch:12},{wch:8},{wch:10},{wch:12},{wch:14},{wch:12},{wch:12},{wch:28},{wch:20}];
  ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:10}},{s:{r:1,c:0},e:{r:1,c:10}}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Alojamentos');
  XLSX.writeFile(wb,`Alojamentos_EmpresaModelo_${hoje.toLocaleDateString('pt-BR').replace(/\//g,'-')}.xlsx`);
  showToast('Excel exportado!');
}
