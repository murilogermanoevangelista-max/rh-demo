<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RH Manager — Empresa Modelo S.A.</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--primary:#1D9E75;--primary-dark:#0F6E56;--primary-light:#E1F5EE;
--bg:#F8F9FA;--surface:#fff;--border:#E5E7EB;
--text:#1a1a1a;--text-muted:#6B7280;
--danger:#E24B4A;--danger-light:#FCEBEB;
--warning:#BA7517;--warning-light:#FAEEDA;
--success:#3B6D11;--success-light:#EAF3DE;
--info:#185FA5;--info-light:#E6F1FB;
--radius:8px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100}
.sidebar-header{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo{font-size:16px;font-weight:600;color:var(--primary)}
.sidebar-sub{font-size:11px;color:var(--text-muted)}
.sidebar-nav{flex:1;padding:12px 8px;overflow-y:auto}
.nav-section{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;padding:8px 8px 4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;color:var(--text-muted);font-size:13px;margin-bottom:2px;transition:all .15s}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--primary-light);color:var(--primary-dark);font-weight:500}
.nav-item i{font-size:16px}
.sidebar-obra-filter{padding:8px 12px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--bg)}
.sidebar-obra-filter label{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
.sidebar-obra-filter select{width:100%;font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);cursor:pointer}
.sidebar-obra-filter select:focus{outline:none;border-color:var(--primary)}
.global-obra-badge{display:none;margin:0 8px 6px;padding:4px 8px;background:var(--primary-light);border-radius:20px;font-size:11px;color:var(--primary-dark);font-weight:500;text-align:center}
.main{margin-left:220px;min-height:100vh;padding:24px}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.page-title{font-size:20px;font-weight:600}
.page-subtitle{font-size:13px;color:var(--text-muted);margin-top:2px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.metric-label{font-size:12px;color:var(--text-muted);margin-bottom:4px}
.metric-value{font-size:24px;font-weight:600;color:var(--text)}
.metric-card.green .metric-value{color:var(--primary-dark)}
.metric-card.red .metric-value{color:var(--danger)}
.metric-card.amber .metric-value{color:var(--warning)}
.table-container{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:6px 12px;min-width:220px}
.search-box input{border:none;background:transparent;outline:none;font-size:13px;color:var(--text);width:100%}
.search-box i{color:var(--text-muted);font-size:15px}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#FAFAFA}
tbody td{padding:10px 16px;font-size:13px}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--primary-dark);overflow:hidden;flex-shrink:0}
.avatar img{width:100%;height:100%;object-fit:cover}
.name-cell{display:flex;align-items:center;gap:10px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-green{background:var(--success-light);color:var(--success)}
.badge-red{background:var(--danger-light);color:var(--danger)}
.badge-amber{background:var(--warning-light);color:var(--warning)}
.badge-blue{background:#E6F1FB;color:#185FA5}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;font-weight:500;transition:all .15s}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-dark);border-color:var(--primary-dark)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{background:var(--danger-light);color:var(--danger);border-color:transparent}
.btn-info{background:var(--info-light);color:var(--info);border-color:transparent}
.btn-success{background:var(--success-light);color:var(--success);border-color:transparent}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.modal{background:var(--surface);border-radius:var(--radius-lg);width:100%;max-width:700px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
.modal-title{font-size:16px;font-weight:600}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
label{font-size:12px;font-weight:500;color:var(--text-muted)}
input,select,textarea{padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;color:var(--text);background:var(--surface);outline:none;transition:border .15s;width:100%}
input:focus,select:focus{border-color:var(--primary)}
.form-section{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;padding-bottom:6px;border-bottom:1px solid var(--border);grid-column:1/-1}
.foto-upload{display:flex;align-items:center;gap:16px;grid-column:1/-1;padding:16px;background:var(--bg);border-radius:var(--radius);border:1px dashed var(--border)}
.foto-preview{width:64px;height:64px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:20px;font-weight:600;color:var(--primary-dark);flex-shrink:0}
.foto-preview img{width:100%;height:100%;object-fit:cover}
.funcao-toggle{font-size:11px;color:var(--primary);cursor:pointer;text-decoration:underline;margin-top:3px;display:inline-block}
.aloj-filtro-ativo{outline:2px solid currentColor;outline-offset:-2px;font-weight:700!important}
.transfer-tipo-btns{grid-column:1/-1;display:flex;gap:10px;margin-top:4px}
.transfer-tipo-btn{flex:1;padding:12px;border:2px solid var(--border);border-radius:var(--radius);cursor:pointer;text-align:center;transition:all .2s;background:var(--surface)}
.transfer-tipo-btn:hover{border-color:var(--primary);background:var(--primary-light)}
.transfer-tipo-btn.selected-envio{border-color:var(--warning);background:var(--warning-light)}
.transfer-tipo-btn.selected-recebimento{border-color:var(--info);background:var(--info-light)}
.transfer-tipo-btn .ttb-icon{font-size:22px;margin-bottom:4px}
.transfer-tipo-btn .ttb-label{font-size:13px;font-weight:600}
.transfer-tipo-btn .ttb-desc{font-size:11px;color:var(--text-muted);margin-top:2px}
.transfer-block{grid-column:1/-1;display:none}
.transfer-block.visible{display:contents}
.transfer-fields{grid-column:1/-1;display:none}
.transfer-fields.visible{display:contents}
.transfer-header{grid-column:1/-1;display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--radius);font-size:13px;font-weight:600;margin-top:4px}
.transfer-header.envio{background:var(--warning-light);color:var(--warning)}
.transfer-header.recebimento{background:var(--info-light);color:var(--info)}
/* FICHA */
.ficha-modal{max-width:800px}
.ficha-header-card{background:linear-gradient(135deg,var(--primary-dark),var(--primary));border-radius:var(--radius-lg);padding:24px;display:flex;align-items:center;gap:20px;margin-bottom:24px;color:#fff}
.ficha-avatar{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;overflow:hidden;flex-shrink:0;border:3px solid rgba(255,255,255,.4)}
.ficha-avatar img{width:100%;height:100%;object-fit:cover}
.ficha-nome{font-size:20px;font-weight:700;margin-bottom:4px}
.ficha-mat{font-size:13px;opacity:.8}
.ficha-badges{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.ficha-badge{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;background:rgba(255,255,255,.2);color:#fff}
.ficha-section{margin-bottom:20px}
.ficha-section-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.ficha-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ficha-field{display:flex;flex-direction:column;gap:3px}
.ficha-field.full{grid-column:1/-1}
.ficha-field-label{font-size:11px;color:var(--text-muted);font-weight:500}
.ficha-field-value{font-size:14px;color:var(--text);font-weight:500}
.ficha-transf-card{background:var(--warning-light);border:1px solid #F0D090;border-radius:var(--radius);padding:16px;margin-bottom:20px}
.ficha-transf-card.recebimento{background:var(--info-light);border-color:#9EC5F0}
.ficha-transf-title{font-size:12px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ficha-transf-title.envio{color:var(--warning)}
.ficha-transf-title.recebimento{color:var(--info)}
.ficha-export-btns{display:flex;gap:8px}
.empty-state{text-align:center;padding:48px 24px;color:var(--text-muted)}
.empty-state i{font-size:48px;margin-bottom:12px;display:block;opacity:.3}
.loading{text-align:center;padding:32px;color:var(--text-muted)}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a1a;color:#fff;padding:12px 16px;border-radius:var(--radius);font-size:13px;z-index:9999;transform:translateY(100px);transition:transform .3s;max-width:320px}
.toast.show{transform:translateY(0)}
.toast.success{background:var(--primary-dark)}
.toast.error{background:var(--danger)}
.action-btns{display:flex;gap:4px}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-select{padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--surface);color:var(--text);outline:none}
.login-screen{position:fixed;inset:0;background:linear-gradient(135deg,var(--primary-dark),var(--primary));display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.login-card{background:var(--surface);border-radius:var(--radius-lg);box-shadow:0 20px 50px rgba(0,0,0,.25);padding:36px 32px;width:100%;max-width:380px}
.login-logo{display:flex;align-items:center;gap:8px;font-size:20px;font-weight:700;color:var(--primary-dark);margin-bottom:2px}
.login-sub{font-size:12px;color:var(--text-muted);margin-bottom:24px}
.login-field{margin-bottom:14px}
.login-field label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:5px}
.login-field input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px}
.login-error{display:none;background:var(--danger-light);color:var(--danger);font-size:12px;padding:8px 10px;border-radius:var(--radius);margin-bottom:14px}
.login-btn{width:100%;justify-content:center;padding:11px;font-size:14px}
@media(max-width:768px){.sidebar{display:none}.main{margin-left:0}.form-grid{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}.ficha-grid{grid-template-columns:1fr}}
/* EXPERIÊNCIA */
.exp-alert{border-radius:var(--radius-lg);padding:16px 20px;display:flex;align-items:center;gap:16px;margin-bottom:20px;border:1px solid}
.exp-alert.danger{background:#FFF5F5;border-color:#FED7D7;color:#C53030}
.exp-alert.warning{background:#FFFBEB;border-color:#FCD34D;color:#92400E}
.exp-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.exp-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius-lg);padding:14px;cursor:pointer;transition:all .2s;text-align:center}
.exp-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.exp-card.active{border-color:var(--primary);background:var(--primary-light)}
.exp-card-value{font-size:28px;font-weight:700;margin-bottom:2px}
.exp-card-label{font-size:11px;color:var(--text-muted);font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.exp-card.blue .exp-card-value{color:#185FA5}
.exp-card.green .exp-card-value{color:var(--primary-dark)}
.exp-card.amber .exp-card-value{color:var(--warning)}
.exp-card.red .exp-card-value{color:var(--danger)}
.exp-card.purple .exp-card-value{color:#6B21A8}
.exp-tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--bg);padding:4px;border-radius:var(--radius);width:fit-content}
.exp-tab{padding:6px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text-muted);transition:all .15s}
.exp-tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.status-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.status-exp1{background:#DBEAFE;color:#1E40AF}
.status-exp2{background:#FEF3C7;color:#92400E}
.status-efetivado{background:var(--success-light);color:var(--success)}
.status-vencendo{background:#FFF3CD;color:#856404;border:1px solid #FCD34D}
.status-vencida{background:var(--danger-light);color:var(--danger)}
.dias-restantes{font-weight:700;font-size:13px}
.dias-restantes.ok{color:var(--primary-dark)}
.dias-restantes.warn{color:var(--warning)}
.dias-restantes.danger{color:var(--danger)}
.obs-cell{max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:var(--text-muted);cursor:pointer}
.obs-cell:hover{color:var(--primary)}
.efetivar-btn{background:#E8F5E9;color:#2E7D32;border:1px solid #A5D6A7;border-radius:var(--radius);padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
.efetivar-btn:hover{background:#C8E6C9}
.obs-modal{max-width:480px}
/* FOLGAS */
.folga-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px}
.folga-row{display:grid;grid-template-columns:260px 100px 120px 100px repeat(5,1fr);gap:0;align-items:stretch;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;overflow:hidden}
.folga-cell{padding:10px 12px;border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;font-size:13px}
.folga-cell:last-child{border-right:none}
.folga-cell-header{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.folga-venc{border-radius:6px;padding:4px 8px;font-size:12px;font-weight:600;text-align:center;margin-bottom:4px}
.folga-venc.ok{background:var(--success-light);color:var(--success)}
.folga-venc.warn{background:#FFF3CD;color:#856404;border:1px solid #FCD34D}
.folga-venc.danger{background:var(--danger-light);color:var(--danger)}
.folga-venc.future{background:var(--bg);color:var(--text-muted)}
.folga-saida-real{font-size:11px;color:var(--primary);cursor:pointer;text-decoration:underline}
.folga-saida-proj{font-size:11px;color:var(--text-muted)}
.folga-header-row{display:grid;grid-template-columns:260px 100px 120px 100px repeat(5,1fr);gap:0;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;margin-bottom:0;overflow:hidden}
.folga-header-cell{padding:8px 12px;font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;border-right:1px solid var(--border)}
.folga-header-cell:last-child{border-right:none}
.folga-func-name{font-weight:600;font-size:13px}
.folga-func-sub{font-size:11px;color:var(--text-muted);margin-top:2px}
.passagem-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.passagem-aerea{background:#E6F1FB;color:#185FA5}
.passagem-terrestre{background:var(--success-light);color:var(--success)}
.passagem-nao{background:var(--bg);color:var(--text-muted)}
.folga-alert-banner{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--radius);margin-bottom:8px;font-size:13px}
.folga-alert-banner.danger{background:var(--danger-light);border:1px solid #FCA5A5;color:#991B1B}
.folga-alert-banner.warn{background:#FFFBEB;border:1px solid #FCD34D;color:#92400E}
/* FÉRIAS */
.ferias-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius-lg);padding:14px;text-align:center;cursor:pointer;transition:all .2s}
.ferias-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.ferias-card.active{border-color:var(--primary);background:var(--primary-light)}
.ferias-card-value{font-size:28px;font-weight:700;margin-bottom:2px}
.ferias-card-label{font-size:11px;color:var(--text-muted);font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.ferias-card.red .ferias-card-value{color:var(--danger)}
.ferias-card.amber .ferias-card-value{color:var(--warning)}
.ferias-card.green .ferias-card-value{color:var(--primary-dark)}
.ferias-card.blue .ferias-card-value{color:#185FA5}
.ferias-card.purple .ferias-card-value{color:#6B21A8}
.ferias-periodo{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.ferias-periodo-1{background:#DBEAFE;color:#1E40AF}
.ferias-periodo-2{background:#FEE2E2;color:#991B1B}
.ferias-status-vencida{background:var(--danger-light);color:var(--danger);border:1px solid #FCA5A5}
.ferias-status-vencendo{background:#FFF3CD;color:#856404;border:1px solid #FCD34D}
.ferias-status-programada{background:var(--success-light);color:var(--success)}
.ferias-status-ok{background:var(--bg);color:var(--text-muted)}
.prog-btn{background:#E8F5E9;color:#2E7D32;border:1px solid #A5D6A7;border-radius:var(--radius);padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
.prog-btn:hover{background:#C8E6C9}
.prog-btn.programada{background:#DBEAFE;color:#1E40AF;border-color:#93C5FD}
.prog-btn.programada:hover{background:#BFDBFE}
/* ALOJAMENTOS */
.aloj-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:0;overflow:hidden;transition:box-shadow .2s}
.aloj-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.aloj-card-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg)}
.aloj-card-body{padding:14px 16px}
.aloj-vagas-bar{height:8px;border-radius:4px;background:var(--border);margin:6px 0;overflow:hidden}
.aloj-vagas-fill{height:100%;border-radius:4px;background:var(--primary);transition:width .3s}
.aloj-vagas-fill.full{background:var(--danger)}
.aloj-vagas-fill.warn{background:var(--warning)}

function initials(n){if(!n)return'?';return n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();}

function formatDate(d){
  if(!d)return'—';
  if(d instanceof Date){if(isNaN(d.getTime()))return'—';return d.toLocaleDateString('pt-BR');}
  const parsed=new Date(d+'T12:00:00');
  if(isNaN(parsed.getTime()))return'—';
  return parsed.toLocaleDateString('pt-BR');
}
function parseDate(str){
  if(!str)return null;
  if(str instanceof Date)return str;
  const d=new Date(str+'T12:00:00');
  return isNaN(d.getTime())?null:d;
}
// Parse Excel serial date (number) to JS Date
function excelSerialToDate(serial){
  if(!serial||isNaN(serial))return null;
  // Excel date serial: days since 1900-01-01, with leap year bug
  const d=new Date(Math.round((serial - 25569)*86400*1000));
  return d;
}
// Parse date string DD/MM/YYYY or excel serial
function parseDPDate(val){
  if(!val)return null;
  if(typeof val==='number') return excelSerialToDate(val);
  if(typeof val==='string'){
    const m=val.match(/(\d{2})\/(\d{2})\/(\d{4})/);
    if(m) return new Date(`${m[3]}-${m[2]}-${m[1]}T12:00:00`);
    const d=new Date(val+'T12:00:00');
    return isNaN(d.getTime())?null:d;
  }
  if(val instanceof Date) return val;
  return null;
}
function toISO(d){
  if(!d)return null;
  const dt=d instanceof Date?d:new Date(d);
  if(isNaN(dt.getTime()))return null;
  return dt.toISOString().split('T')[0];
}

async function renderDashboard(){
  await loadFolgas();
  await loadFerias();
  const hoje=new Date();hoje.setHours(0,0,0,0);
  // Aplicar filtro global de obra em todos os cálculos do dashboard
  const funcsFiltrados=globalObraFiltro?funcionarios.filter(f=>f.obra_id===globalObraFiltro):funcionarios;
  const ativos=funcsFiltrados.filter(f=>f.situacao==='ativo').length;
  const inativos=funcsFiltrados.filter(f=>f.situacao==='inativo').length;
  const transferidos=funcionarios.filter(f=>f.obra_transferencia_id).length;
  const admMes=funcsFiltrados.filter(f=>{
    if(!f.data_admissao||f.situacao==='transferido')return false;
    const d=new Date(f.data_admissao+'T12:00:00');
    return d.getMonth()===hoje.getMonth()&&d.getFullYear()===hoje.getFullYear();
  }).length;

  const ativosLista=funcionarios.filter(f=>f.situacao==='ativo'&&(!globalObraFiltro||f.obra_id===globalObraFiltro));
  const comExp=ativosLista.map(f=>({...f,_exp:calcExp(f)})).filter(f=>f._exp);
  const emExp=comExp.filter(f=>['exp1','exp2','vencendo'].includes(f._exp.status)).length;
  const expVencendo=comExp.filter(f=>f._exp.status==='vencendo').length;
  const expVencidas=comExp.filter(f=>f._exp.status==='vencida').length;

  const folgasDash=globalObraFiltro?folgas.filter(f=>{const obraObj=obras.find(o=>o.id===globalObraFiltro);return f.funcionario?.obra?.codigo===(obraObj?.codigo||'');}):folgas;
  const feriasDash=globalObraFiltro?feriasData.filter(f=>{const obraObj=obras.find(o=>o.id===globalObraFiltro);return f.funcionario?.obra?.codigo===(obraObj?.codigo||'');}):feriasData;
  let folgasVencidas=0,folgasVencendo=0;
  folgasDash.forEach(f=>{
    const vencs=calcVencimentos(f);
    vencs.forEach((v,i)=>{
      const st=vencStatus(v,f[`saida${i+1}_real`],f.periodo_trabalhado);
      if(st==='danger')folgasVencidas++;
      if(st==='warn')folgasVencendo++;
    });
  });

  // Férias stats
  const {feriasVencidas,feriasVencendo60,feriasProgTotal}=calcFeriasStats(feriasData,hoje);

  const byObra={};
  ativosLista.forEach(f=>{
    const key=f.obra?.codigo?`${f.obra.codigo} — ${f.obra.nome}`:'Sem obra';
    byObra[key]=(byObra[key]||0)+1;
  });
  const byFuncao={};
  ativosLista.forEach(f=>{
    const key=f.funcao?.nome||f.funcao_manual||'Sem função';
    byFuncao[key]=(byFuncao[key]||0)+1;
  });
  const admissoesMeses=[];
  for(let i=5;i>=0;i--){
    const d=new Date();d.setMonth(d.getMonth()-i);
    const label=d.toLocaleDateString('pt-BR',{month:'short',year:'2-digit'});
    const count=funcionarios.filter(f=>{
      if(!f.data_admissao)return false;
      const fd=new Date(f.data_admissao+'T12:00:00');
      return fd.getMonth()===d.getMonth()&&fd.getFullYear()===d.getFullYear();
    }).length;
    admissoesMeses.push({label,count});
  }
  const maxAdm=Math.max(...admissoesMeses.map(m=>m.count),1);
  // Férias programadas — cálculo antecipado (necessário para alertas)
  const feriasProgramadas=[];
  feriasDash.forEach(f=>{
    if(!f.programado||!f.data_inicio_programada||!f.data_fim_programada)return;
    const ini=parseDate(f.data_inicio_programada);
    const fim=parseDate(f.data_fim_programada);
    if(!ini||!fim)return;
    const diffIni=Math.floor((ini-hoje)/86400000);
    const diffFim=Math.floor((fim-hoje)/86400000);
    if(diffFim>=-7){
      const emCurso=(diffIni<=0&&diffFim>=0);
      feriasProgramadas.push({nome:f.funcionario?.nome_completo||f.matricula,mat:f.matricula,obra:f.funcionario?.obra?.codigo||'',ini,fim,diffIni,diffFim,emCurso});
    }
  });
  feriasProgramadas.sort((a,b)=>a.diffIni-b.diffIni);
  const feriasProgEmCurso=feriasProgramadas.filter(f=>f.emCurso).length;

  // Alertas de alojamentos
  const contasObrigatorias=['agua','energia','gas','condominio'];
  const mesAtual=hoje.getMonth()+1;const anoAtual=hoje.getFullYear();
  const alojSemContas=alojamentos.filter(a=>{
    const contasMesAloj=alojamentosContas.filter(c=>String(c.alojamento_id)===String(a.id)&&c.mes===mesAtual&&c.ano===anoAtual);
    const tiposLancados=new Set(contasMesAloj.map(c=>c.tipo));
    return contasObrigatorias.some(t=>!tiposLancados.has(t)&&!a['isenta_'+t]);
  });
  const qtdAlojSemContas=alojSemContas.length;
  const alojContratosVencidos=alojamentos.filter(a=>{const d=parseDate(a.data_termino);return d&&d<hoje;});
  const alojContratosVencendo=alojamentos.filter(a=>{const d=parseDate(a.data_termino);if(!d)return false;const diff=Math.floor((d-hoje)/86400000);return diff>=0&&diff<=60;});

  const alertas=[];

  if(alojContratosVencendo.length>0)alertas.push({tipo:'warning',icon:'ti-home-clock',msg:`${alojContratosVencendo.length} contrato(s) de alojamento vencendo em 60 dias`,link:'alojamentos'});

  const alertasHtml=alertas.map(a=>`

        <div style="font-weight:600;font-size:14px;margin-bottom:12px;display:flex;align-items:center;gap:8px;cursor:pointer" onclick="showPage('folgas')">

        <div style="display:flex;align-items:flex-end;gap:6px;height:100px">${admBarras}</div>
      </div>
    </div>
  `;

function calcFeriasStats(data,hoje){
  let feriasVencidas=0,feriasVencendo60=0,feriasProgTotal=0;
  data.forEach(f=>{
    if(f.programado)feriasProgTotal++;
    const limMax=parseDate(f.dt_limite_maxima);
    if(!f.programado&&limMax){
      const diff=Math.floor((limMax-hoje)/86400000);
      if(diff<0)feriasVencidas++;
      else if(diff<=60)feriasVencendo60++;
    }
  });
  return{feriasVencidas,feriasVencendo60,feriasProgTotal};
}

let filtroSituacao='',filtroObra='',busca='';

let funcTab='ativos'; // 'ativos' | 'transferidos'

function getFuncionariosFiltrados(){
  let lista=funcionarios;
  // Aba ativos: ativo + inativo (nunca transferido)
  // Aba transferidos: apenas transferido
  if(funcTab==='transferidos'){
    // Histórico: quem SAIU de alguma obra (tem obra_transferencia_id preenchido)
    lista=lista.filter(f=>f.obra_transferencia_id);
    if(filtroObra){
      // Na obra X: mostra quem SAIU dela (obra_transferencia_id = X)
      lista=lista.filter(f=>f.obra_transferencia_id===filtroObra);
    }
  } else {
    // Ativos/Inativos: filtra por obra_id atual — onde o funcionário ESTÁ agora
    // Não exclui ninguém por tipo_transferencia; quem foi transferido está na nova obra
    if(filtroSituacao)lista=lista.filter(f=>f.situacao===filtroSituacao);
    if(filtroObra)lista=lista.filter(f=>f.obra_id===filtroObra);
  }
  if(busca){const b=busca.toLowerCase();lista=lista.filter(f=>f.nome_completo?.toLowerCase().includes(b)||f.matricula?.toLowerCase().includes(b));}
  return lista;
}

function exportFuncionariosExcel(){
  const hoje=new Date();
  const dataEmissao=hoje.toLocaleDateString('pt-BR');

  // Usar a lista filtrada atual (respeita busca, situação e obra)
  let lista=funcionarios;
  if(filtroSituacao)lista=lista.filter(f=>f.situacao===filtroSituacao);
  if(filtroObra)lista=lista.filter(f=>f.obra_id===filtroObra);
  if(busca)lista=lista.filter(f=>f.nome_completo?.toLowerCase().includes(busca.toLowerCase())||f.matricula?.includes(busca));

  if(!lista.length){showToast('Nenhum funcionário para exportar.','error');return;}

  // Título dinâmico conforme filtros ativos
  const obraLabel=filtroObra?obras.find(o=>o.id===filtroObra)?.codigo||'':'Todas as Obras';
  const situLabel=filtroSituacao?filtroSituacao.charAt(0).toUpperCase()+filtroSituacao.slice(1):'Todas Situações';

  const rows=[];
  rows.push([`LISTA DE EFETIVO — EMPRESA MODELO S.A.`,'','','','','']);
  rows.push([`Emitido em: ${dataEmissao}  ·  ${obraLabel}  ·  ${situLabel}  ·  ${lista.length} funcionário(s)`,'','','','','']);
  rows.push([]);
  rows.push(['NOME','MATRÍCULA','FUNÇÃO','OBRA / CONTRATO','EMPRESA','ADMISSÃO','SITUAÇÃO']);

  lista.forEach(f=>{
    const funcao=f.funcao?.nome||f.funcao_manual||'—';
    const obra=f.obra?.codigo?`${f.obra.codigo} — ${f.obra.nome||''}`.trim():f.obra?.nome||'—';
    const empresa=f.empresa?.nome||'—';
    const admissao=f.data_admissao?new Date(f.data_admissao+'T12:00:00').toLocaleDateString('pt-BR'):'—';
    const situacao=f.situacao?f.situacao.charAt(0).toUpperCase()+f.situacao.slice(1):'—';
    rows.push([f.nome_completo||'—',f.matricula||'—',funcao,obra,empresa,admissao,situacao]);
  });

  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:36},{wch:12},{wch:30},{wch:30},{wch:36},{wch:14},{wch:14}];
  ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:6}},{s:{r:1,c:0},e:{r:1,c:6}}];

  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Efetivo');

  const sufixo=filtroObra?`_${obras.find(o=>o.id===filtroObra)?.codigo||'filtro'}`:'';
  XLSX.writeFile(wb,`Efetivo_EmpresaModelo${sufixo}_${dataEmissao.replace(/\//g,'-')}.xlsx`);
  showToast(`Excel exportado — ${lista.length} funcionário(s)!`);
}

async function exportFichaPDF(id){
  const f=funcionarios.find(x=>x.id===id);if(!f)return;
  const {jsPDF}=window.jspdf;const doc=new jsPDF();
  const funcaoNome=f.funcao?.nome||f.funcao_manual||'—';
  doc.setFillColor(15,110,86);doc.rect(0,0,210,40,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(18);doc.setFont('helvetica','bold');
  doc.text('Empresa Modelo S.A. — RH Manager',14,16);doc.setFontSize(11);doc.setFont('helvetica','normal');
  doc.text('Ficha de Registro de Colaborador',14,26);doc.setFontSize(9);
  doc.text(`Emitido em: ${new Date().toLocaleDateString('pt-BR')}`,14,34);
  doc.setTextColor(26,26,26);let y=52;
  const field=(label,val,x=14,yy=y)=>{
    doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(107,114,128);
    doc.text(label.toUpperCase(),x,yy);doc.setFontSize(11);doc.setFont('helvetica','normal');doc.setTextColor(26,26,26);
    doc.text(String(val||'—'),x,yy+6);return yy+14;
  };
  doc.setFontSize(12);doc.setFont('helvetica','bold');doc.text(f.nome_completo||'',14,y);y+=7;
  doc.setFontSize(10);doc.setFont('helvetica','normal');doc.setTextColor(107,114,128);
  doc.text(`Matrícula: ${f.matricula||'—'}`,14,y);y+=14;
  doc.setDrawColor(229,231,235);doc.line(14,y,196,y);y+=8;
  doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(26,26,26);doc.text('DADOS PROFISSIONAIS',14,y);y+=8;
  y=field('Função',funcaoNome,14,y);field('Empresa',f.empresa?.nome,110,y-14);
  y=field('Obra / Contrato',`${f.obra?.codigo||''} ${f.obra?.nome||'—'}`.trim(),14,y);field('Situação',f.situacao,110,y-14);
  y=field('Data de Admissão',formatDate(f.data_admissao),14,y);field('Data de Integração',formatDate(f.data_mobilizacao),110,y-14);
  y=field('Cidade',f.cidade,14,y);field('UF',f.uf,110,y-14);
  doc.save(`Ficha_${(f.nome_completo||'funcionario').replace(/\s+/g,'_')}.pdf`);
  showToast('PDF exportado com sucesso!');
}

function exportFichaExcel(id){
  const f=funcionarios.find(x=>x.id===id);if(!f)return;
  const funcaoNome=f.funcao?.nome||f.funcao_manual||'—';
  const dados=[['FICHA DE REGISTRO — EMPRESA MODELO S.A.',''],['Emitido em',new Date().toLocaleDateString('pt-BR')],['',''],
    ['DADOS PROFISSIONAIS',''],['Nome Completo',f.nome_completo||'—'],['Matrícula',f.matricula||'—'],
    ['Função',funcaoNome],['Empresa',f.empresa?.nome||'—'],
    ['Obra / Contrato',`${f.obra?.codigo||''} ${f.obra?.nome||'—'}`.trim()],
    ['Data de Admissão',formatDate(f.data_admissao)],['Data de Integração',formatDate(f.data_mobilizacao)],
    ['Situação',f.situacao||'—'],['Cidade',f.cidade||'—'],['UF',f.uf||'—']];
  const ws=XLSX.utils.aoa_to_sheet(dados);ws['!cols']=[{wch:30},{wch:40}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Ficha');
  XLSX.writeFile(wb,`Ficha_${(f.nome_completo||'funcionario').replace(/\s+/g,'_')}.xlsx`);
  showToast('Excel exportado com sucesso!');
}

async function saveFuncionario(id){
  const mat=document.getElementById('f-matricula').value.trim();
  const nome=document.getElementById('f-nome').value.trim();
  if(!mat||!nome){showToast('Matrícula e nome são obrigatórios','error');return;}
  const isMod=funcaoModoManual;
  const funcaoId=isMod?null:document.getElementById('f-funcao-select').value||null;
  const funcaoManual=isMod?document.getElementById('f-funcao-input').value.trim():null;
  const situacao=document.getElementById('f-situacao').value;
  const isTransf=situacao==='transferido';
  const tipoTransf=isTransf?tipoTransferencia:'';
  // Na transferência por Envio: o funcionário VAI para outra obra
  //   obra_id = nova obra (destino) → onde está agora
  //   obra_transferencia_id = obra atual (origem) → histórico
  //   situacao = ativo (continua ativo na nova obra)
  // Na transferência por Recebimento: o funcionário VEIO de outra obra
  //   obra_id = obra atual (já preenchida no form, onde está agora)
  //   obra_transferencia_id = obra de origem
  //   situacao = ativo
  const obraTransfId=isTransf?document.getElementById('f-obra-transf').value||null:null;
  const obraAtualId=document.getElementById('f-obra').value||null;
  let obraFinal=obraAtualId;
  let obraOrigem=null;
  if(isTransf&&tipoTransf==='envio'&&obraTransfId){
    obraFinal=obraTransfId;   // vai para a obra de destino
    obraOrigem=obraAtualId;   // registra a obra de origem
  } else if(isTransf&&tipoTransf==='recebimento'&&obraTransfId){
    obraFinal=obraAtualId;    // já está na obra atual
    obraOrigem=obraTransfId;  // veio desta obra
  }
  let fotoUrl=null;
  if(fotoFile){
    const ext=fotoFile.name.split('.').pop();
    const path=`fotos/${Date.now()}.${ext}`;
    const{error:upErr}=await sb.storage.from('funcionarios').upload(path,fotoFile,{contentType:fotoFile.type});
    if(!upErr){const{data:urlData}=sb.storage.from('funcionarios').getPublicUrl(path);fotoUrl=urlData.publicUrl;}
  }else if(id){
    const f=funcionarios.find(x=>x.id===id);
    fotoUrl=f?.foto_url||null;
  }
  const payload={
    matricula:mat,nome_completo:nome,
    data_admissao:document.getElementById('f-admissao').value||null,
    data_mobilizacao:document.getElementById('f-integracao').value||null,
    situacao:isTransf?'ativo':situacao,
    tipo:document.getElementById('f-tipo').value,
    periodo_experiencia:parseInt(document.getElementById('f-periodo-exp').value),
    funcao_id:funcaoId,funcao_manual:funcaoManual,
    empresa_id:document.getElementById('f-empresa').value||null,
    obra_id:obraFinal,

// ─── EXPERIÊNCIA ──────────────────────────────────────────────────────────────
let expFiltro='',expBuscaVal='';

function calcExp(f){
  if(!f.data_admissao)return null;
  if(f.efetivado)return{status:'efetivado',restantes:0,fim1:null,fim2:null};
  const admissao=new Date(f.data_admissao+'T12:00:00');
  const periodoRaw=f.periodo_experiencia;
  const unico=periodoRaw==='30s';
  const periodo=unico?30:parseInt(periodoRaw)||45;
  const fim1=new Date(admissao);fim1.setDate(fim1.getDate()+periodo-1);
  const fim2=unico?null:new Date(admissao);if(!unico)fim2.setDate(fim2.getDate()+periodo*2-1);
  const hoje=new Date();hoje.setHours(0,0,0,0);
  const diff1=Math.floor((fim1-hoje)/86400000);
  if(unico){
    if(diff1<0)return{status:'vencida',restantes:diff1,fim1,fim2:null};
    if(diff1<=15)return{status:'vencendo',restantes:diff1,fim1,fim2:null};
    return{status:'exp1',restantes:diff1,fim1,fim2:null};
  }
  const diff2=Math.floor((fim2-hoje)/86400000);
  if(diff2<0)return{status:'vencida',restantes:diff2,fim1,fim2};
  if(diff2<=15)return{status:'vencendo',restantes:diff2,fim1,fim2};
  if(diff1<0)return{status:'exp2',restantes:diff2,fim1,fim2};
  return{status:'exp1',restantes:diff1,fim1,fim2};
}

function renderExperiencia(){
  const ativosLista=funcionarios.filter(f=>f.situacao==='ativo'&&(!globalObraFiltro||f.obra_id===globalObraFiltro));
  const comExp=ativosLista.map(f=>({...f,_exp:calcExp(f)})).filter(f=>f._exp);
  const counts={exp1:0,exp2:0,vencendo:0,vencida:0,efetivado:0};
  comExp.forEach(f=>counts[f._exp.status]=(counts[f._exp.status]||0)+1);
  const emExpTotal=(counts.exp1||0)+(counts.exp2||0)+(counts.vencendo||0);
  const taxaEfet=comExp.length?Math.round((counts.efetivado||0)/comExp.length*100):0;
  let lista=comExp;
  if(expFiltro==='emexp')lista=comExp.filter(f=>['exp1','exp2','vencendo'].includes(f._exp.status));
  else if(expFiltro&&expFiltro!=='todos')lista=comExp.filter(f=>f._exp.status===expFiltro);
  if(expBuscaVal)lista=lista.filter(f=>(f.nome_completo||'').toLowerCase().includes(expBuscaVal.toLowerCase())||(f.matricula||'').includes(expBuscaVal));
  lista=[...lista].sort((a,b)=>{
    const order={vencida:0,vencendo:1,exp2:2,exp1:3,efetivado:4};
    const od=(order[a._exp.status]||0)-(order[b._exp.status]||0);
    if(od!==0)return od;
    return(a._exp.restantes||0)-(b._exp.restantes||0);
  });
  const alertas=[];
  if(counts.vencida>0)alertas.push(`<div class="exp-alert danger"><i class="ti ti-alert-triangle" style="font-size:24px;flex-shrink:0"></i><div><strong>${counts.vencida} experiência(s) vencida(s)</strong><div style="font-size:13px;margin-top:2px">Ação imediata necessária — efetivar ou desligar</div></div></div>`);
  if(counts.vencendo>0)alertas.push(`<div class="exp-alert warning"><i class="ti ti-clock" style="font-size:24px;flex-shrink:0"></i><div><strong>${counts.vencendo} vencendo em 15 dias</strong><div style="font-size:13px;margin-top:2px">Planejar efetivação ou desligamento</div></div></div>`);
  const cardsData=[
    {key:'emexp',label:'Em Exp.',value:emExpTotal,cls:'blue'},
    {key:'exp1',label:'Exp.1',value:counts.exp1||0,cls:'blue'},
    {key:'exp2',label:'Exp.2',value:counts.exp2||0,cls:'amber'},
    {key:'efetivado',label:'Efetivados',value:counts.efetivado||0,cls:'green'},
    {key:'vencendo',label:'Vencendo',value:counts.vencendo||0,cls:'amber'},
    {key:'vencida',label:'Vencidas',value:counts.vencida||0,cls:'red'},
    {key:'taxa',label:'% Efetivação',value:taxaEfet+'%',cls:'purple',noFilter:true},
  ];
  const cardsHtml=cardsData.map(c=>`
    <div class="exp-card ${c.cls} ${expFiltro===c.key?'active':''}" onclick="${c.noFilter?'':'expFiltro=\''+c.key+'\';renderExperiencia()'}">
      <div class="exp-card-value">${c.value}</div>
      <div class="exp-card-label">${c.label}</div>
    </div>`).join('');
  let tableContent='';
  if(true){
    const rows=lista.map(f=>{
      const e=f._exp;
      const stClass={vencida:'status-vencida',vencendo:'status-vencendo',exp1:'status-exp1',exp2:'status-exp2',efetivado:'status-efetivado'}[e.status]||'';
      const stLabel={vencida:'Vencida',vencendo:'Vencendo',exp1:'Exp. 1º',exp2:'Exp. 2º',efetivado:'Efetivado'}[e.status]||e.status;
      const diasCls=e.restantes<0?'danger':e.restantes<=15?'warn':'ok';
      const diasTxt=e.status==='efetivado'?'—':`${e.restantes}d`;
      const funcaoNome=f.funcao?.nome||f.funcao_manual||'—';
      const efetBtn=e.status!=='efetivado'?`<button class="efetivar-btn" onclick="efetivarFunc('${f.id}')">✓ Efetivar</button>`:'<span style="color:var(--success);font-size:12px">✓ Efetivado</span>';
      return`<tr>
        <td><div class="name-cell">
          <div class="avatar">${f.foto_url?`<img src="${f.foto_url}" alt="">`:initials(f.nome_completo)}</div>
          <div><div style="font-weight:500">${f.nome_completo}</div><div style="font-size:11px;color:var(--text-muted)">${f.matricula||'—'}</div></div>
        </div></td>
        <td style="font-size:12px">${funcaoNome}</td>
        <td>${f.periodo_experiencia==='30s'?'30d (único)':`${parseInt(f.periodo_experiencia)||45}+${parseInt(f.periodo_experiencia)||45}d`}</td>
        <td>${formatDate(e.fim1)}</td>
        <td>${formatDate(e.fim2)}</td>
        <td><span class="dias-restantes ${diasCls}">${diasTxt}</span></td>
        <td><span class="status-badge ${stClass}">${stLabel}</span></td>
        <td><div class="obs-cell" onclick="editObs('${f.id}')" title="${f.observacao_interna||'Adicionar observação'}">${f.observacao_interna||'+ obs'}</div></td>
        <td>${efetBtn}</td>
      </tr>`;}).join('')||`<tr><td colspan="9"><div class="empty-state"><i class="ti ti-certificate"></i><div>Nenhum registro encontrado</div></div></td></tr>`;
    tableContent=`<div class="table-container"><table>
      <thead><tr><th>Funcionário</th><th>Função</th><th>Período</th><th>Fim 1º</th><th>Fim 2º</th><th>Restantes</th><th>Obs.</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
  }
  document.getElementById('main-content').innerHTML=`
    <div class="page-header">
      <div><div class="page-title">Controle de Experiência</div><div class="page-subtitle">${comExp.length} colaboradores em acompanhamento</div></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm" onclick="exportExpExcel()"><i class="ti ti-file-type-xls"></i> Excel</button>
        <button class="btn btn-sm btn-success" onclick="exportExpPDF()"><i class="ti ti-file-type-pdf"></i> PDF</button>
      </div>
    </div>
    ${alertas.join('')}
    <div class="exp-cards">${cardsHtml}</div>
    <div style="display:flex;align-items:center;justify-content:flex-end;margin-bottom:12px">
      <div style="display:flex;gap:8px">
        <div class="search-box" style="min-width:180px"><i class="ti ti-search"></i><input placeholder="Buscar..." oninput="expBusca(this.value)" id="exp-search" value="${expBuscaVal}"></div>
        <button class="btn btn-sm" onclick="expFiltro='';expBuscaVal='';renderExperiencia()"><i class="ti ti-x"></i> Limpar</button>
      </div>
    </div>
    ${tableContent}`;
}

// ─── FOLGAS ───────────────────────────────────────────────────────────────────
let folgasFiltro='todos',folgasBusca='';

function calcVencimentos(folga){
  const vencs=[];
  const baseDate=parseDate(folga.data_inicio);
  if(!baseDate)return vencs;
  const periodo=parseInt(folga.periodo_trabalhado)||30;
  const ciclos=periodo===180?[180,360,540,720,900]:periodo===90?[90,180,270,360,450]:periodo===60?[60,120,180,240,300]:periodo===45?[45,90,135,180,225]:[30,60,90,120,150];
  for(let i=0;i<5;i++){
    const v=new Date(baseDate);v.setDate(v.getDate()+ciclos[i]);vencs.push(v);
  }
  return vencs;
}
function vencStatus(venc,realDate,periodo){
  if(realDate)return'ok';
  const hoje=new Date();hoje.setHours(0,0,0,0);
  const diff=Math.floor((venc-hoje)/86400000);
  const limiteWarn=parseInt(periodo)===30?10:30;
  if(diff<0)return'danger';
  if(diff<=limiteWarn)return'warn';
  return'future';
}
function diasFolga(periodo){
  const map={180:5,90:5,60:3,45:2,30:1};return map[periodo]||1;
}

async function renderFolgas(){
  await loadFolgas();
  const hoje=new Date();hoje.setHours(0,0,0,0);
  let lista=folgas;
  if(globalObraFiltro){const obraObj=obras.find(o=>o.id===globalObraFiltro);const obraCod=obraObj?.codigo||'';lista=lista.filter(f=>f.funcionario?.obra?.codigo===obraCod);}
  if(folgasBusca)lista=lista.filter(f=>f.funcionario?.nome_completo?.toLowerCase().includes(folgasBusca.toLowerCase())||f.funcionario?.matricula?.includes(folgasBusca));
  if(folgasFiltro==='warn')lista=lista.filter(f=>{const vencs=calcVencimentos(f);return vencs.some((v,i)=>vencStatus(v,f[`saida${i+1}_real`],f.periodo_trabalhado)==='warn');});
  if(folgasFiltro==='danger')lista=lista.filter(f=>{const vencs=calcVencimentos(f);return vencs.some((v,i)=>vencStatus(v,f[`saida${i+1}_real`],f.periodo_trabalhado)==='danger');});
  lista=[...lista].sort((a,b)=>{
    const aVencs=calcVencimentos(a);const bVencs=calcVencimentos(b);
    const aMin=Math.min(...aVencs.filter((_,i)=>!a[`saida${i+1}_real`]).map(v=>v.getTime()),Infinity);
    const bMin=Math.min(...bVencs.filter((_,i)=>!b[`saida${i+1}_real`]).map(v=>v.getTime()),Infinity);
    return aMin-bMin;
  });
  // totalVenc/totalWarn baseados na lista já filtrada por obra
  const listaBase=globalObraFiltro?folgas.filter(f=>{const obraObj=obras.find(o=>o.id===globalObraFiltro);return f.funcionario?.obra?.codigo===(obraObj?.codigo||'');}):folgas;
  let totalVenc=0,totalWarn=0;
  listaBase.forEach(f=>{const vencs=calcVencimentos(f);vencs.forEach((v,i)=>{const st=vencStatus(v,f[`saida${i+1}_real`],f.periodo_trabalhado);if(st==='danger')totalVenc++;if(st==='warn')totalWarn++;});});
  const obraOptions=obras.map(o=>`<option value="${o.id}">${o.codigo} — ${o.nome}</option>`).join('');
  const rows=lista.map(f=>{
    const vencs=calcVencimentos(f);
    const nDias=diasFolga(f.periodo_trabalhado);
    const vencCells=vencs.map((v,i)=>{
      const st=vencStatus(v,f[`saida${i+1}_real`],f.periodo_trabalhado);
      const realDate=f[`saida${i+1}_real`];
      const projDate=f[`saida${i+1}_projecao`];
      const diff=Math.floor((v-hoje)/86400000);
      const diffTxt=realDate?'✓':(diff<0?`${Math.abs(diff)}d atrás`:`${diff}d`);
      return`<div class="folga-cell">
        <div class="folga-cell-header">Venc.${i+1}</div>
        <div class="folga-venc ${realDate?'ok':st}">${formatDate(v)}<br><small>${diffTxt}</small></div>
        ${realDate?`<div style="font-size:11px;color:var(--success)">✓ Saiu: ${formatDate(realDate)} <span style="cursor:pointer;color:var(--danger);margin-left:4px" onclick="removeSaidaReal('${f.id}',${i+1})">✕</span></div>`:
        `<div class="folga-saida-proj">Proj: ${formatDate(projDate)||'—'}</div>
        <div class="folga-saida-real" onclick="lancarSaidaReal('${f.id}',${i+1})">+ Lançar saída</div>`}
      </div>`;}).join('');
    const passagemBadges=`
      ${f.tipo_passagem_aerea?'<span class="passagem-badge passagem-aerea">✈ Aérea</span>':''}
      ${f.tipo_passagem_terrestre?'<span class="passagem-badge passagem-terrestre">🚌 Terrestre</span>':''}
      ${!f.tipo_passagem_aerea&&!f.tipo_passagem_terrestre?'<span class="passagem-badge passagem-nao">—</span>':''}`;
    return`<div class="folga-row">
      <div class="folga-cell">
        <div class="folga-func-name">${f.funcionario?.nome_completo||'—'}</div>
        <div class="folga-func-sub">${f.funcionario?.matricula||''} · ${f.funcionario?.obra?.nome||'—'}</div>
        ${(f.funcionario?.funcao?.nome)?`<div style="font-size:11px;color:var(--primary-dark);font-weight:500;margin-top:1px">${f.funcionario.funcao.nome}</div>`:''}

          <button class="btn btn-sm" title="Editar" onclick="openModalFolga('${f.id}')" style="padding:3px 8px;font-size:11px"><i class="ti ti-edit"></i> Editar</button>
          <button class="btn btn-sm btn-danger" title="Excluir" onclick="deleteFolgaConfirm('${f.id}')" style="padding:3px 8px;font-size:11px"><i class="ti ti-trash"></i></button>

        ${f.cidade_origem?`<div style="font-size:11px;color:var(--text-muted);margin-top:2px">📍 ${f.cidade_origem}</div>`:''}
      </div>
      <div class="folga-cell"><div class="folga-cell-header">Período</div><div style="font-weight:600">${f.periodo_trabalhado||'—'} dias</div></div>
      <div class="folga-cell"><div class="folga-cell-header">Início</div>${formatDate(f.data_inicio)}</div>
      <div class="folga-cell"><div class="folga-cell-header">Folga</div><div style="font-weight:700;color:var(--primary-dark)">${nDias} dia(s) útil</div></div>
      ${vencCells}
    </div>`;}).join('')||`<div class="empty-state"><i class="ti ti-beach"></i><div>Nenhum registro de folga encontrado</div></div>`;
  // ── Card 1: Em folga AGORA (saiu, ainda não retornou) ──
  const emFolgaAgora=[];
  listaBase.forEach(function(f){
    const nD=diasFolga(f.periodo_trabalhado);

      const real=f['saida'+i+'_real'];
      if(!real)continue;

      const retorno=new Date(saida);var cont=0;
      while(cont<nD){retorno.setDate(retorno.getDate()+1);const dw=retorno.getDay();if(dw!==0&&dw!==6)cont++;}
      if(saida<=hoje&&retorno>=hoje){
        emFolgaAgora.push({nome:(f.funcionario&&f.funcionario.nome_completo?f.funcionario.nome_completo.split(' ').slice(0,2).join(' '):'—'),saida:saida,retorno:retorno,busca:(f.funcionario&&f.funcionario.nome_completo?f.funcionario.nome_completo.split(' ')[0]:'')});break;
      }
    }
  });

  // ── Cards por mês: saídas agendadas (saída real lançada futura) ──
  const mesLabel=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const mesAtual=hoje.getMonth(),anoAtual=hoje.getFullYear();
  const proxMes=(mesAtual+1)%12,anoProxMes=mesAtual===11?anoAtual+1:anoAtual;
  const agendMesAtual=[],agendProxMes=[];
  listaBase.forEach(function(f){
    for(var i=1;i<=5;i++){
      const real=f['saida'+i+'_real'];if(!real)continue;
      const saida=parseDate(real);if(!saida)continue;
      if(saida>hoje){
        const m=saida.getMonth(),a=saida.getFullYear();
        const info={nome:(f.funcionario&&f.funcionario.nome_completo?f.funcionario.nome_completo.split(' ').slice(0,2).join(' '):'—'),saida:saida,busca:(f.funcionario&&f.funcionario.nome_completo?f.funcionario.nome_completo.split(' ')[0]:'')};
        if(m===mesAtual&&a===anoAtual)agendMesAtual.push(info);
        else if(m===proxMes&&a===anoProxMes)agendProxMes.push(info);
        break;
      }
    }
  });
  agendMesAtual.sort(function(a,b){return a.saida-b.saida;});
  agendProxMes.sort(function(a,b){return a.saida-b.saida;});

  // Montar seção de cards
  var cardsHtml='';
  const temAgora=emFolgaAgora.length>0;
  const temAgend=agendMesAtual.length>0||agendProxMes.length>0;
  if(temAgora||temAgend){
    var secTitle='<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><i class="ti ti-plane" style="color:var(--primary);font-size:16px"></i><span style="font-size:13px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px">Situação das Folgas</span></div>';
    var cardsCols='';

    // Card "Em folga agora"
    if(temAgora){
      var itensAgora=emFolgaAgora.map(function(f){return itemAgoraRow(f);}).join('');

async function saveFolga(id){
  const funcId=document.getElementById('fl-func').value;
  const dataInicio=document.getElementById('fl-inicio').value;
  if(!funcId||!dataInicio){showToast('Funcionário e data início são obrigatórios','error');return;}
  const periodo=parseInt(document.getElementById('fl-periodo').value);
  const base=new Date(dataInicio+'T12:00:00');
  const ciclos=periodo===180?[180,360,540,720,900]:periodo===90?[90,180,270,360,450]:periodo===60?[60,120,180,240,300]:periodo===45?[45,90,135,180,225]:[30,60,90,120,150];
  const projecoes={};
  for(let i=0;i<5;i++){const d=new Date(base);d.setDate(d.getDate()+ciclos[i]);projecoes[`saida${i+1}_projecao`]=toISO(d);}
  const payload={
    funcionario_id:funcId,data_inicio:dataInicio,
    periodo_trabalhado:periodo,
    cidade_origem:document.getElementById('fl-cidade').value.trim()||null,
    tipo_passagem_aerea:document.getElementById('fl-aerea').checked,
    tipo_passagem_terrestre:document.getElementById('fl-terrestre').checked,
    ...projecoes
  };
  const{error}=id?await sb.from('folgas').update(payload).eq('id',id):await sb.from('folgas').insert(payload);
  if(error){showToast('Erro: '+error.message,'error');return;}
  showToast(id?'Folga atualizada!':'Folga cadastrada!');closeModal('modal-folga');renderFolgas();
}

async function deleteFolga(id){
  if(!confirm('Excluir este registro de folga?'))return;
  await sb.from('folgas').delete().eq('id',id);
  showToast('Folga excluída!');closeModal('modal-folga');renderFolgas();
}
async function deleteFolgaConfirm(id){
  if(!confirm('Excluir este registro de folga?'))return;
  await sb.from('folgas').delete().eq('id',id);
  showToast('Folga excluída!');await loadFolgas();renderFolgas();
}

async function lancarSaidaReal(folgaId,num){
  // Input no formato brasileiro DD/MM/AAAA
  const entrada=prompt(`Data de saída real (saída ${num}) — formato DD/MM/AAAA:`);
  if(!entrada)return;
  // Converter DD/MM/AAAA → AAAA-MM-DD para o banco
  const partes=entrada.trim().split('/');
  let dataISO;
  if(partes.length===3&&partes[0].length<=2&&partes[1].length<=2&&partes[2].length===4){
    dataISO=`${partes[2]}-${partes[1].padStart(2,'0')}-${partes[0].padStart(2,'0')}`;
  } else if(/^\d{4}-\d{2}-\d{2}$/.test(entrada.trim())){
    // Aceita também AAAA-MM-DD caso o usuário insira assim
    dataISO=entrada.trim();
  } else {
    showToast('Formato inválido. Use DD/MM/AAAA (ex: 15/06/2026)','error');
    return;
  }
  // Validar data
  const d=new Date(dataISO+'T12:00:00');
  if(isNaN(d.getTime())){showToast('Data inválida. Use DD/MM/AAAA','error');return;}
  const{error}=await sb.from('folgas').update({[`saida${num}_real`]:dataISO}).eq('id',folgaId);
  if(error){showToast('Erro: '+error.message,'error');return;}
  showToast('Saída real lançada!');renderFolgas();
}

async function removeSaidaReal(folgaId,num){
  if(!confirm('Remover saída real lançada?'))return;
  await sb.from('folgas').update({[`saida${num}_real`]:null}).eq('id',folgaId);
  showToast('Saída removida.');renderFolgas();
}
