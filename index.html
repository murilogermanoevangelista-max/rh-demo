async function importarHE(file){
  if(!file)return;
  showToast('Importando H.E...');
  try{
    const{read,utils}=await import('https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm');
    const buf=await file.arrayBuffer();
    const wb=read(buf,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=utils.sheet_to_json(ws,{header:1,defval:''});

    // Encontrar header: linha com "Matrícula" ou "Nome"
    let hi=rows.findIndex(r=>r.some(c=>String(c).toLowerCase().includes('matrícula')||String(c).toLowerCase().includes('matricula')));
    if(hi<0)hi=rows.findIndex(r=>r.some(c=>String(c).toLowerCase().includes('nome')));
    if(hi<0){showToast('Formato não reconhecido','error');return;}

    // Detectar período do cabeçalho
    let dataISO='';
    for(let i=0;i<hi;i++){
      const row=rows[i]||[];
      for(let j=0;j<row.length;j++){
        const cell=String(row[j]||'').toLowerCase();
        if(cell.includes('período')||cell.includes('periodo')){
          const m=cell.match(/(\d{2})\/(\d{2})\/(\d{4})/);
          if(m){dataISO=m[3]+'-'+m[2]+'-'+m[1];break;}
        }
      }
      if(dataISO)break;
    }
    if(!dataISO){
      // Tentar primeira data serial nas linhas de dados
      for(let i=hi+1;i<rows.length;i++){
        const v=rows[i][0];
        if(typeof v==='number'&&v>40000&&v<55000){
          const d=new Date(Math.round((v-25569)*86400000));
          dataISO=d.toISOString().slice(0,10);break;
        }
      }
    }
    if(!dataISO)dataISO=new Date().toISOString().slice(0,10);
    console.log('[importarHE] data:',dataISO);

    // Horas: valor em fração de dia -> converter para minutos
    // 1 dia = 1440 min, 1 hora = 1/24 dia
    function fracToMins(v){
      if(!v||v===0)return 0;
      return Math.round(Number(v)*24*60);
    }

    const regs=[];
    rows.slice(hi+1).forEach(r=>{
      const dataVal=r[0];
      const nome=String(r[1]||'').trim();
      const mat=String(r[2]||'').trim();
      const tipo=String(r[4]||'').trim(); // Ocorrência
      const horas=r[5]; // Horas em fração de dia

      if(!mat||!nome||!tipo||!tipo.toLowerCase().includes('hora extra'))return;

      // Data da linha (serial Excel ou usar data do período)
      let linhaData=dataISO;
      if(typeof dataVal==='number'&&dataVal>40000&&dataVal<55000){
        const d=new Date(Math.round((dataVal-25569)*86400000));
        linhaData=d.toISOString().slice(0,10);
      }

      const mins=fracToMins(horas);
      if(mins<=0)return;

      regs.push({
        data:linhaData,
        periodo_ini:dataISO,
        matricula:mat,
        nome:nome.toUpperCase(),
        tipo:tipo.replace('Hora Extra ','HE ').trim(),
        mins,
      });
    });

    if(!regs.length){showToast('Nenhum registro de H.E. encontrado','error');return;}

    // Deletar registros do mesmo período antes de inserir
    await sb.from('efetivo_he').delete().eq('periodo_ini',dataISO);

    for(let i=0;i<regs.length;i+=500){
      const{error}=await sb.from('efetivo_he').insert(regs.slice(i,i+500));
      if(error){showToast('Erro: '+error.message,'error');return;}
    }

    const totalMins=regs.reduce((s,r)=>s+r.mins,0);
    const hh=Math.floor(totalMins/60),mm=totalMins%60;
    showToast('H.E. importadas! '+regs.length+' registros · Total: '+String(hh).padStart(3,'0')+':'+String(mm).padStart(2,'0'));
    efetivoViewMode='he';
    await loadEfetivo();renderEfetivo();
  }catch(e){showToast('Erro: '+e.message,'error');console.error(e);}
}

async function importarHoras(file){
  if(!file)return;
  showToast('Importando horas...');
  try{
    const{read,utils}=await import('https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm');
    const buf=await file.arrayBuffer();
    const wb=read(buf,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=utils.sheet_to_json(ws,{header:1,defval:''});

    // Buscar data do PERÍODO (não do título) — priorizar linha com "Período de:"
    let dataISO='';
    // 1ª prioridade: linha que contém "Período de:" ou "periodo"
    for(let i=0;i<10;i++){
      const row=rows[i]||[];
      for(let j=0;j<row.length;j++){
        const cell=String(row[j]||'').toLowerCase();
        if(cell.includes('período de')||cell.includes('periodo de')){
          const m=cell.match(/(\d{2})\/(\d{2})\/(\d{4})/);
          if(m){dataISO=m[3]+'-'+m[2]+'-'+m[1];break;}
        }
      }
      if(dataISO)break;
    }
    // 2ª prioridade: coluna Data nas linhas de dados (serial Excel)
    if(!dataISO){
      for(let i=5;i<rows.length;i++){
        const row=rows[i]||[];
        if(!row[0]||isNaN(Number(row[0])))continue;
        for(let j=0;j<row.length;j++){
          if(typeof row[j]==='number'&&row[j]>40000&&row[j]<55000){
            const d=new Date(Math.round((row[j]-25569)*86400000));
            dataISO=d.toISOString().slice(0,10);break;
          }
        }
        if(dataISO)break;
      }
    }
    if(!dataISO)dataISO=new Date().toISOString().slice(0,10);
    console.log('[importarHoras] dataISO detectada:',dataISO);

    // Encontrar linha de dados (tem matrícula numérica na col 0)
    function parseMins(v){
      if(!v||v==='000:00'||v==='0')return 0;
      const s=String(v).trim();
      const parts=s.split(':');
      if(parts.length===2)return parseInt(parts[0]||0)*60+parseInt(parts[1]||0);
      return 0;
    }

    const regs=[];
    rows.forEach(r=>{
      const mat=String(r[0]||'').trim();
      if(!mat||isNaN(Number(mat)))return;
      const nome=String(r[1]||'').trim().toUpperCase();
      if(!nome)return;
      regs.push({
        data:dataISO,
        matricula:mat,
        nome,
        departamento:String(r[2]||'').trim(),
        mins_a_trabalhar:parseMins(r[3]),
        mins_trabalhadas:parseMins(r[4]),
        mins_descontos:parseMins(r[5]),
        mins_justificadas:parseMins(r[6]),
      });
    });

    if(!regs.length){showToast('Nenhum registro de horas encontrado','error');return;}
    await sb.from('efetivo_horas').delete().eq('data',dataISO);
    for(let i=0;i<regs.length;i+=500){
      const{error}=await sb.from('efetivo_horas').insert(regs.slice(i,i+500));
      if(error){showToast('Erro: '+error.message,'error');return;}
    }
    showToast('Horas importadas! '+regs.length+' registros · '+dataISO.split('-').reverse().join('/'));
    efetivoViewMode='horas';
    await loadEfetivo();renderEfetivo();
  }catch(e){showToast('Erro ao importar: '+e.message,'error');}
}

async function importarEfetivo(file){
  if(!file)return;
  showToast('Importando...');
  try{
    const{read,utils}=await import('https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm');
    const buf=await file.arrayBuffer();
    const wb=read(buf,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=utils.sheet_to_json(ws,{header:1,defval:''});
    let hi=rows.findIndex(r=>String(r[0]||'').toLowerCase().includes('cracha')||String(r[0]||'').toLowerCase().includes('crachá'));
    if(hi<0)hi=rows.findIndex(r=>r.length>=4&&r[0]&&r[1]);
    if(hi<0){showToast('Formato não reconhecido','error');return;}
    const dr=rows.slice(hi+1).filter(r=>r[0]&&r[1]);
    if(!dr.length){showToast('Nenhum registro encontrado','error');return;}
    function xlDate(v){
      if(!v||v==='-')return null;
      if(typeof v==='number'){const d=new Date(Math.round((v-25569)*86400000));return d.toISOString().slice(0,10);}
      if(typeof v==='string'&&v.match(/\d{2}\/\d{2}\/\d{4}/)){const[d,m,y]=v.split('/');return y+'-'+m+'-'+d;}
      return String(v).slice(0,10);
    }
    const dataISO=xlDate(dr[0][3])||new Date().toISOString().slice(0,10);
    const regs=[];
    // Ler diretamente da planilha — col 6 = Situações (PRESENTE/AUSENTE)
    dr.forEach(r=>{
      const mat=String(r[0]||'').trim(),nome=String(r[1]||'').trim();
      if(!mat||!nome)return;
      const situacaoRaw=String(r[6]||'').trim().toUpperCase();
      const marcacoes=String(r[5]||'').trim();
      // Se tem marcação de ponto = PRESENTE, independente da coluna situação
      const temMarcacao=marcacoes&&marcacoes!=='-'&&marcacoes!=='';
      const situacao=temMarcacao?'PRESENTE':(situacaoRaw==='AUSENTE'?'AUSENTE':(situacaoRaw==='PRESENTE'?'PRESENTE':'AUSENTE'));
      regs.push({
        data:dataISO,
        cracha:mat,
        nome:nome.toUpperCase(),
        departamento:String(r[2]||'').trim(),
        situacao,
        horario_entrada:String(r[4]||'')||null,
        marcacoes:temMarcacao?marcacoes:null,
      });
    });
    if(!regs.length){showToast('Nenhum registro para importar','error');return;}
    await sb.from('efetivo_presenca').delete().eq('data',dataISO);
    for(let i=0;i<regs.length;i+=500){
      const{error}=await sb.from('efetivo_presenca').insert(regs.slice(i,i+500));
      if(error){showToast('Erro: '+error.message,'error');return;}
    }
    const np=regs.filter(r=>r.situacao==='PRESENTE').length,na=regs.filter(r=>r.situacao==='AUSENTE').length;
    showToast('Importado! '+np+' presentes · '+na+' ausentes · '+dataISO.split('-').reverse().join('/'));
    efetivoDataFiltro=dataISO;
    await loadEfetivo();renderEfetivo();
  }catch(e){showToast('Erro ao importar: '+e.message,'error');}
}

function exportarEfetivoExcel(tipo){

  const bom='\uFEFF';

async function renderEfetivo(){
  function normMat(v){return String(v||'').trim().replace(/^0+/,'');}

  // ── Determinar data ─────────────────────────────────────────────────────
  const _todasDatas=[...new Set(efetivoData.map(r=>r.data))].sort((a,b)=>b.localeCompare(a));
  if(!efetivoDataFiltro&&_todasDatas.length)efetivoDataFiltro=_todasDatas[0];
  if(_todasDatas.length&&!_todasDatas.includes(efetivoDataFiltro))efetivoDataFiltro=_todasDatas[0];
  const ds=efetivoDataFiltro;

  // ── Filtrar por obra ────────────────────────────────────────────────────
  let efetivoFiltrado;
  if(globalObraFiltro){
    const funcsObra=funcionarios.filter(f=>f.obra_id===globalObraFiltro&&f.situacao!=='inativo');
    const crachasObra=new Set(funcsObra.map(f=>normMat(f.matricula)));
    const presentesDia=efetivoData.filter(r=>r.data===ds&&r.situacao==='PRESENTE'&&crachasObra.has(normMat(r.cracha)));
    const crachasPresentes=new Set(presentesDia.map(r=>normMat(r.cracha)));
    const temImportacaoDia=efetivoData.some(r=>r.data===ds);
    const ausentesSinteticos=temImportacaoDia
      ?funcsObra.filter(f=>!crachasPresentes.has(normMat(f.matricula))).map(f=>({
          id:'_sint_'+f.id,data:ds,cracha:String(f.matricula||'').trim(),
          nome:(f.nome_completo||f.nome||'').toUpperCase(),departamento:f.obra?.nome||'',
          situacao:'AUSENTE',horario_entrada:null,marcacoes:null}))
      :[];
    efetivoFiltrado=[...presentesDia,...ausentesSinteticos];
  } else {
    const temImportacaoDia=efetivoData.some(r=>r.data===ds);
    if(temImportacaoDia){
      const presentesDiaGeral=efetivoData.filter(r=>r.data===ds&&r.situacao==='PRESENTE');
      const crachasPresentesGeral=new Set(presentesDiaGeral.map(r=>normMat(r.cracha)));
      const ausentesGeral=funcionarios.filter(f=>f.situacao!=='inativo'&&!crachasPresentesGeral.has(normMat(f.matricula)))
        .map(f=>({id:'_sint_'+f.id,data:ds,cracha:String(f.matricula||'').trim(),
          nome:(f.nome_completo||f.nome||'').toUpperCase(),departamento:f.obra?.nome||'',
          situacao:'AUSENTE',horario_entrada:null,marcacoes:null}));
      efetivoFiltrado=[...presentesDiaGeral,...ausentesGeral];
    } else {
      efetivoFiltrado=efetivoData;
    }
  }

  // ── Dados do dia ────────────────────────────────────────────────────────
  const datas=globalObraFiltro?_todasDatas:[...new Set(efetivoFiltrado.map(r=>r.data))].sort((a,b)=>b.localeCompare(a));
  const reg=efetivoFiltrado.filter(r=>r.data===ds);
  function getFuncao(cracha){const f=funcionarios.find(x=>normMat(x.matricula)===normMat(cracha));return (f&&(f.funcao?.nome||f.funcao_manual))||'—';}
  const _busca=efetivoBusca.toLowerCase().trim();
  const pres=reg.filter(r=>r.situacao==='PRESENTE'&&(!_busca||(r.nome||'').toLowerCase().includes(_busca)||(r.cracha||'').includes(_busca))).sort((a,b)=>(a.nome||'').localeCompare(b.nome||'','pt-BR',{sensitivity:'base'}));
  const ause=reg.filter(r=>r.situacao==='AUSENTE'&&(!_busca||(r.nome||'').toLowerCase().includes(_busca)||(r.cracha||'').includes(_busca))).sort((a,b)=>(a.nome||'').localeCompare(b.nome||'','pt-BR',{sensitivity:'base'}));
  const tot=reg.length,pct=tot?Math.round(pres.length/tot*100):0;
  const corPct=pct>=90?'var(--success)':pct>=70?'var(--warning)':'var(--danger)';
  const _obraLabel=globalObraFiltro?(obras.find(o=>o.id===globalObraFiltro)?.codigo||''):'Todas as obras';

  // ── Pills de data ───────────────────────────────────────────────────────
  const dPills=datas.slice(0,30).map(d=>{
    const[y,m,dia]=d.split('-');const sel=d===ds;
    return '<button onclick="efetivoDataFiltro=\''+d+'\';efetivoSituacaoFiltro=\'\';renderEfetivo()" style="display:block;width:100%;text-align:left;font-size:12px;padding:6px 12px;border-radius:6px;border:1px solid '+(sel?'var(--primary)':'var(--border)')+';background:'+(sel?'var(--primary)':'var(--surface)')+';color:'+(sel?'#fff':'var(--text-muted)')+';cursor:pointer;font-weight:'+(sel?'600':'400')+'">'+dia+'/'+m+'</button>';
  }).join('');

  // ── Tabs ────────────────────────────────────────────────────────────────
  const tabHtml=['dia','historico','horas','he','resumo'].map(m=>{
    const lbl={dia:'📋 Dia',historico:'📅 Histórico',horas:'⏱️ Horas',he:'⚡ H. Extras',resumo:'📊 Resumo'}[m];
    const sel=efetivoViewMode===m;
    return '<button onclick="efetivoViewMode=\''+m+'\';renderEfetivo()" style="padding:6px 16px;border-radius:6px;border:1px solid '+(sel?'var(--primary)':'var(--border)')+';background:'+(sel?'var(--primary)':'transparent')+';color:'+(sel?'#fff':'var(--text)')+';cursor:pointer;font-size:13px;font-weight:'+(sel?'600':'400')+'">'+lbl+'</button>';
  }).join('');

  // ── Histórico ───────────────────────────────────────────────────────────
  const hm={};
  efetivoFiltrado.forEach(r=>{
    if(!hm[r.data])hm[r.data]={data:r.data,p:0,a:0};
    if(r.situacao==='PRESENTE')hm[r.data].p++;else hm[r.data].a++;
  });
  const hist=Object.values(hm).sort((a,b)=>b.data.localeCompare(a.data));

  // ── Gerar view ──────────────────────────────────────────────────────────
  let view='';

  if(efetivoViewMode==='horas'){
    function fmtMins(m){if(!m)return'000:00';const h=Math.floor(m/60);const mn=m%60;return String(h).padStart(3,'0')+':'+String(mn).padStart(2,'0');}
    const horasFiltradas=globalObraFiltro
      ?efetivoHoras.filter(h=>{const f=funcionarios.find(x=>normMat(x.matricula)===normMat(h.matricula));return f&&f.obra_id===globalObraFiltro;})
      :efetivoHoras;
    const horasFiltroPeriodo=window._horasFiltroPeriodo||'acumulado';
    const datasHoras=[...new Set(horasFiltradas.map(h=>h.data))].sort((a,b)=>b.localeCompare(a));
    const horasFiltroDe=window._horasFiltroDe||datasHoras[datasHoras.length-1]||'';
    const horasFiltroAte=window._horasFiltroAte||datasHoras[0]||'';
    const horasPerMap={};
    horasFiltradas.filter(h=>{
      if(horasFiltroPeriodo==='acumulado')return true;
      if(horasFiltroPeriodo==='dia')return h.data===(window._horasDiaSel||datasHoras[0]||ds);
      return h.data>=horasFiltroDe&&h.data<=horasFiltroAte;
    }).forEach(h=>{
      if(!horasPerMap[h.matricula])horasPerMap[h.matricula]={matricula:h.matricula,nome:h.nome,minsTrab:0,minsJust:0,minsATrabalhar:0,dias:0};
      horasPerMap[h.matricula].minsTrab+=h.mins_trabalhadas||0;
      horasPerMap[h.matricula].minsJust+=h.mins_justificadas||0;
      horasPerMap[h.matricula].minsATrabalhar+=h.mins_a_trabalhar||0;
      if(h.mins_trabalhadas>0||h.mins_justificadas>0)horasPerMap[h.matricula].dias++;
    });
    const listaHoras=Object.values(horasPerMap).sort((a,b)=>b.minsTrab-a.minsTrab);
    const totalMinsTrab=listaHoras.reduce((s,h)=>s+h.minsTrab,0);
    const totalMinsJust=listaHoras.reduce((s,h)=>s+h.minsJust,0);
    // Pill de data para horas

      </div>
    </div>
    ${datas.length===0?'<div style="text-align:center;padding:60px;color:var(--text-muted)"><i class="ti ti-upload" style="font-size:48px;display:block;margin-bottom:16px;opacity:.3"></i><div style="font-size:16px;font-weight:500;margin-bottom:8px">Nenhum dado importado</div><div style="font-size:13px">Clique em "Importar Presentes" para começar</div></div>':`
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px"><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Total Efetivo</div><div style="font-size:28px;font-weight:700">${tot}</div><div style="font-size:11px;color:var(--text-muted);margin-top:4px">${ds?ds.split('-').reverse().join('/'):'—'}</div></div>
      <div onclick="efetivoSituacaoFiltro=efetivoSituacaoFiltro==='PRESENTE'?'':'PRESENTE';efetivoViewMode='dia';renderEfetivo()" style="background:var(--success-light);border:2px solid ${efetivoSituacaoFiltro==='PRESENTE'?'var(--success)':'#BBF7D0'};border-radius:var(--radius);padding:16px;cursor:pointer"><div style="font-size:11px;color:var(--success);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">✓ Presentes ${efetivoSituacaoFiltro==='PRESENTE'?'· Filtrado':''}</div><div style="font-size:28px;font-weight:700;color:var(--success)">${pres.length}</div><div style="font-size:11px;color:var(--success);margin-top:4px">${pct}% do efetivo</div></div>
      <div onclick="efetivoSituacaoFiltro=efetivoSituacaoFiltro==='AUSENTE'?'':'AUSENTE';efetivoViewMode='dia';renderEfetivo()" style="background:var(--danger-light);border:2px solid ${efetivoSituacaoFiltro==='AUSENTE'?'var(--danger)':'#FCA5A5'};border-radius:var(--radius);padding:16px;cursor:pointer"><div style="font-size:11px;color:var(--danger);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">✗ Ausentes ${efetivoSituacaoFiltro==='AUSENTE'?'· Filtrado':''}</div><div style="font-size:28px;font-weight:700;color:var(--danger)">${ause.length}</div><div style="font-size:11px;color:var(--danger);margin-top:4px">${100-pct}% do efetivo</div></div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px"><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">% Presença</div><div style="font-size:28px;font-weight:700;color:${corPct}">${pct}%</div><div style="margin-top:8px;height:6px;background:var(--border);border-radius:3px"><div style="height:6px;border-radius:3px;background:${corPct};width:${pct}%"></div></div></div>
    </div>
    <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;flex-wrap:wrap">
      <div style="min-width:110px"><div style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Data:</div><div style="display:flex;flex-direction:column;gap:4px;max-height:240px;overflow-y:auto">${dPills}</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
      <div style="display:flex;gap:8px;flex-wrap:wrap">${tabHtml}</div>
      <div style="margin-left:auto;position:relative">
        <i class="ti ti-search" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px"></i>
        <input type="text" placeholder="Buscar funcionário..." value="${efetivoBusca}" oninput="efetivoBusca=this.value;renderEfetivo()" style="padding:6px 12px 6px 32px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;width:220px;background:var(--surface)">
      </div>
    </div>
    ${view}`}
  `;
}


if(checkSessao()){
  entrarNoApp();
} else {
  document.getElementById('login-screen').style.display='flex';
}
</script>
</body>
</html>
